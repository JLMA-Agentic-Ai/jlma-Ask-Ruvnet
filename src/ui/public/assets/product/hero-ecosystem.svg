<svg viewBox="0 0 1200 800" width="1200" height="800" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Subtle Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset result="offOut" in="SourceAlpha" dx="0" dy="5" />
      <feGaussianBlur result="blurOut" in="offOut" stdDeviation="5" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>

    <!-- Arrowhead Marker for general flow -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#e2e8f0">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <!-- Arrowhead Markers for product-specific flows -->
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#8b5cf6">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#06b6d4">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#10b981">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#ef4444">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="#0f0f1a"/>

  <!-- Core Insight Callout -->
  <rect x="200" y="30" width="800" height="60" rx="10" fill="#2a2a3b" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="65" text-anchor="middle" font-size="20" font-weight="bold" fill="#e2e8f0">
    The RuvNet AI Ecosystem: A complete platform for intelligent agent development.
  </text>

  <!-- Central RVF Format Container -->
  <g transform="translate(450, 290)">
    <rect x="0" y="0" width="300" height="220" rx="12" fill="#2a2a3b" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <!-- RVF Icon (Stylized File/Container) -->
    <rect x="110" y="40" width="80" height="80" fill="#e2e8f0" rx="8"/>
    <path d="M190 40 L190 60 L210 60 L190 40 Z" fill="#e2e8f0"/>
    <path d="M190 40 L210 60 L210 120 L190 120 L190 40 Z" fill="#e2e8f0" opacity="0.5"/>
    <text x="150" y="155" text-anchor="middle" font-size="22" font-weight="bold" fill="#e2e8f0">RVF Format Hub</text>
    <text x="150" y="180" text-anchor="middle" font-size="14" fill="#a0aec0">Shared Data Standard</text>
    <rect x="75" y="195" width="150" height="20" rx="5" fill="#555"/>
    <text x="150" y="210" text-anchor="middle" font-size="12" fill="#e2e8f0">377 articles in 0.5MB</text>
  </g>

  <!-- RUFLO (top-left) -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="400" height="250" rx="12" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
    <!-- Lightning bolt icon -->
    <path d="M50 30 L30 60 L60 60 L40 90 L80 50 L50 50 Z" fill="#8b5cf6" transform="translate(15, -10) scale(0.6)"/>
    <text x="100" y="55" font-size="22" font-weight="bold" fill="#8b5cf6">RUFLO Orchestration</text>
    <text x="100" y="78" font-size="14" fill="#d8b4fe">Coordinator + 4 Agents</text>
    <rect x="25" y="95" width="120" height="20" rx="5" fill="#8b5cf6" opacity="0.8"/>
    <text x="85" y="110" text-anchor="middle" font-size="12" fill="#e2e8f0">21K GitHub stars</text>

    <!-- Agent Hierarchy -->
    <circle cx="200" cy="150" r="25" fill="#8b5cf6"/>
    <text x="200" y="155" text-anchor="middle" font-size="12" fill="#e2e8f0">Coord</text>
    <line x1="200" y1="175" x2="150" y2="210" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="200" y1="175" x2="190" y2="210" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="200" y1="175" x2="210" y2="210" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="200" y1="175" x2="250" y2="210" stroke="#8b5cf6" stroke-width="2"/>

    <circle cx="150" cy="225" r="20" fill="#8b5cf6" opacity="0.7"/>
    <text x="150" y="230" text-anchor="middle" font-size="10" fill="#e2e8f0">Coder</text>
    <circle cx="190" cy="225" r="20" fill="#8b5cf6" opacity="0.7"/>
    <text x="190" y="230" text-anchor="middle" font-size="10" fill="#e2e8f0">Research</text>
    <circle cx="230" cy="225" r="20" fill="#8b5cf6" opacity="0.7"/>
    <text x="230" y="230" text-anchor="middle" font-size="10" fill="#e2e8f0">Tester</text>
    <circle cx="270" cy="225" r="20" fill="#8b5cf6" opacity="0.7"/>
    <text x="270" y="230" text-anchor="middle" font-size="10" fill="#e2e8f0">Reviewer</text>
  </g>

  <!-- RUVECTOR (top-right) -->
  <g transform="translate(700, 120)">
    <rect x="0" y="0" width="400" height="250" rx="12" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
    <!-- Magnifying glass icon -->
    <circle cx="65" cy="50" r="20" stroke="#06b6d4" stroke-width="4" fill="none"/>
    <line x1="80" y1="65" x2="95" y2="80" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
    <text x="100" y="55" font-size="22" font-weight="bold" fill="#06b6d4">RUVECTOR DB</text>
    <text x="100" y="78" font-size="14" fill="#67e8f9">HNSW Graph Search</text>
    <rect x="25" y="95" width="120" height="20" rx="5" fill="#06b6d4" opacity="0.8"/>
    <text x="85" y="110" text-anchor="middle" font-size="12" fill="#e2e8f0">3.2K GitHub stars</text>
    <rect x="155" y="95" width="150" height="20" rx="5" fill="#06b6d4" opacity="0.8"/>
    <text x="230" y="110" text-anchor="middle" font-size="12" fill="#e2e8f0">150x-12,500x faster</text>

    <!-- HNSW Graph Visual -->
    <circle cx="200" cy="170" r="40" fill="#06b6d4" opacity="0.2"/>
    <circle cx="200" cy="170" r="25" fill="#06b6d4" opacity="0.4"/>
    <circle cx="200" cy="170" r="10" fill="#06b6d4" opacity="0.6"/>
    <circle cx="200" cy="170" r="3" fill="#06b6d4"/>

    <!-- Nodes and path -->
    <circle cx="160" cy="140" r="4" fill="#06b6d4"/>
    <circle cx="240" cy="140" r="4" fill="#06b6d4"/>
    <circle cx="160" cy="200" r="4" fill="#06b6d4"/>
    <circle cx="240" cy="200" r="4" fill="#06b6d4"/>
    <circle cx="180" cy="170" r="4" fill="#06b6d4"/>
    <circle cx="220" cy="170" r="4" fill="#06b6d4"/>
    <circle cx="190" cy="150" r="4" fill="#06b6d4"/>
    <circle cx="210" cy="190" r="4" fill="#06b6d4"/>

    <path d="M160 140 Q180 150, 200 170 Q220 180, 240 200" stroke="#e2e8f0" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
    <circle cx="160" cy="140" r="6" fill="#e2e8f0"/>
    <circle cx="240" cy="200" r="6" fill="#e2e8f0"/>
  </g>

  <!-- PI BRAIN (bottom-left) -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="400" height="250" rx="12" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <!-- Brain icon -->
    <path d="M70 30 C50 10, 30 10, 20 30 C10 50, 20 70, 40 80 C60 90, 80 80, 90 60 C100 40, 90 20, 70 30 Z M50 35 C45 40, 45 60, 50 65 M70 35 C75 40, 75 60, 70 65 M60 25 V75" fill="#10b981" transform="translate(15, -10) scale(0.6)"/>
    <text x="100" y="55" font-size="22" font-weight="bold" fill="#10b981">PI BRAIN Collective AI</text>
    <text x="100" y="78" font-size="14" fill="#6ee7b7">Knowledge Graph + Voting</text>
    <rect x="25" y="95" width="160" height="20" rx="5" fill="#10b981" opacity="0.8"/>
    <text x="105" y="110" text-anchor="middle" font-size="12" fill="#e2e8f0">880 Shared Memories</text>
    <rect x="195" y="95" width="120" height="20" rx="5" fill="#10b981" opacity="0.8"/>
    <text x="255" y="110" text-anchor="middle" font-size="12" fill="#e2e8f0">55 Contributors</text>

    <!-- Knowledge Graph with Contributors -->
    <circle cx="200" cy="180" r="40" fill="#10b981" opacity="0.4"/>
    <text x="200" y="185" text-anchor="middle" font-size="12" fill="#e2e8f0">Knowledge</text>
    <text x="200" y="200" text-anchor="middle" font-size="12" fill="#e2e8f0">Graph</text>

    <circle cx="100" cy="180" r="15" fill="#10b981" opacity="0.7"/>
    <text x="100" y="185" text-anchor="middle" font-size="10" fill="#e2e8f0">C1</text>
    <path d="M115 180 L155 180" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="135" y="170" font-size="10" fill="#10b981">Vote</text>

    <circle cx="300" cy="180" r="15" fill="#10b981" opacity="0.7"/>
    <text x="300" y="185" text-anchor="middle" font-size="10" fill="#e2e8f0">C2</text>
    <path d="M285 180 L245 180" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="265" y="170" font-size="10" fill="#10b981">Vote</text>

    <circle cx="200" cy="120" r="15" fill="#10b981" opacity="0.7"/>
    <text x="200" y="125" text-anchor="middle" font-size="10" fill="#e2e8f0">C3</text>
    <path d="M200 135 L200 150" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="210" y="145" font-size="10" fill="#10b981">Vote</text>

    <circle cx="200" cy="240" r="15" fill="#10b981" opacity="0.7"/>
    <text x="200" y="245" text-anchor="middle" font-size="10" fill="#e2e8f0">C4</text>
    <path d="M200 225 L200 210" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="210" y="220" font-size="10" fill="#10b981">Vote</text>
  </g>

  <!-- AIMDS (bottom-right) -->
  <g transform="translate(700, 480)">
    <rect x="0" y="0" width="400" height="250" rx="12" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
    <!-- Shield icon -->
    <path d="M60,30 L95,45 L95,75 C95,100 60,110 60,110 C60,110 25,100 25,75 L25,45 Z" fill="#ef4444" transform="translate(15, -10) scale(0.6)"/>
    <text x="100" y="55" font-size="22" font-weight="bold" fill="#ef4444">AIMDS AI Security</text>
    <text x="100" y="78" font-size="14" fill="#fca5a5">5-Layer Defense</text>
    <rect x="25" y="95" width="120" height="20" rx="5" fill="#ef4444" opacity="0.8"/>
    <text x="85" y="110" text-anchor="middle" font-size="12" fill="#e2e8f0">Self-Improving</text>

    <!-- 5-Layer Defense Pipeline (Funnels) -->
    <g transform="translate(150, 140)">
      <polygon points="0 0, 100 0, 80 20, 20 20" fill="#ef4444" opacity="0.2"/>
      <text x="50" y="15" text-anchor="middle" font-size="10" fill="#fca5a5">Input Scan</text>
      <polygon points="20 20, 80 20, 70 40, 30 40" fill="#ef4444" opacity="0.3"/>
      <text x="50" y="35" text-anchor="middle" font-size="10" fill="#fca5a5">Semantic</text>
      <polygon points="30 40, 70 40, 60 60, 40 60" fill="#ef4444" opacity="0.4"/>
      <text x="50" y="55" text-anchor="middle" font-size="10" fill="#fca5a5">Behavioral</text>
      <polygon points="40 60, 60 60, 55 80, 45 80" fill="#ef4444" opacity="0.5"/>
      <text x="50" y="75" text-anchor="middle" font-size="10" fill="#fca5a5">Reasoning</text>
      <polygon points="45 80, 55 80, 50 100, 50 100" fill="#ef4444" opacity="0.6"/>
      <text x="50" y="95" text-anchor="middle" font-size="10" fill="#fca5a5">Meta-Learn</text>
    </g>
  </g>

  <!-- Connection Arrows -->
  <!-- RUFLO to RVF -->
  <path d="M300 370 C350 390, 400 390, 450 390" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead-purple)"/>
  <text x="360" y="380" font-size="12" fill="#8b5cf6">Agent Output</text>

  <!-- RVF to RUFLO -->
  <path d="M450 410 C400 410, 350 410, 300 430" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrowhead-purple)"/>
  <text x="360" y="420" font-size="12" fill="#8b5cf6">Prompts</text>


  <!-- RUVECTOR to RVF -->
  <path d="M700 370 C750 390, 800 390, 850 390" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrowhead-cyan)"/>
  <text x="780" y="380" font-size="12" fill="#06b6d4">Embeddings</text>

  <!-- RVF to RUVECTOR -->
  <path d="M850 410 C800 410, 750 410, 700 430" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrowhead-cyan)"/>
  <text x="780" y="420" font-size="12" fill="#06b6d4">Queries</text>


  <!-- PI BRAIN to RVF -->
  <path d="M300 480 C350 500, 400 500, 450 500" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  <text x="360" y="490" font-size="12" fill="#10b981">Knowledge</text>

  <!-- RVF to PI BRAIN -->
  <path d="M450 520 C400 520, 350 520, 300 540" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  <text x="360" y="530" font-size="12" fill="#10b981">Context</text>


  <!-- AIMDS to RVF -->
  <path d="M700 480 C750 500, 800 500, 850 500" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="780" y="490" font-size="12" fill="#ef4444">Threat Data</text>

  <!-- RVF to AIMDS -->
  <path d="M850 520 C800 520, 750 520, 700 540" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="780" y="530" font-size="12" fill="#ef4444">Validated Input</text>

</svg>