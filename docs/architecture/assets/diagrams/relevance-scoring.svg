<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; stroke-width: 1.5; rx: 6; }
      .title { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 14px; fill: #f0f6fc; font-weight: 600; }
      .label { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 12px; fill: #c9d1d9; }
      .sublabel { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 10px; fill: #8b949e; }
      .pct { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 12px; fill: #f0f6fc; font-weight: 600; }
      .bar-bg { fill: #21262d; rx: 3; }
      .bar-1 { fill: #58a6ff; rx: 3; }
      .bar-2 { fill: #3fb950; rx: 3; }
      .bar-3 { fill: #d2a8ff; rx: 3; }
      .bar-4 { fill: #f0883e; rx: 3; }
      .bar-5 { fill: #f85149; rx: 3; }
      .note { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 11px; fill: #58a6ff; }
    </style>
  </defs>

  <rect class="bg" width="600" height="320" rx="8"/>
  <rect class="box" x="15" y="15" width="570" height="290"/>
  <text class="title" x="300" y="42" text-anchor="middle">Knowledge Search Scoring</text>

  <!-- Semantic Similarity - 40% -->
  <text class="label" x="30" y="80">Semantic Similarity</text>
  <text class="sublabel" x="30" y="96">(HNSW cosine, 384d)</text>
  <rect class="bar-bg" x="240" y="70" width="300" height="20"/>
  <rect class="bar-1" x="240" y="70" width="240" height="20"/>
  <text class="pct" x="554" y="85" text-anchor="end">40%</text>

  <!-- Intent Alignment - 20% -->
  <text class="label" x="30" y="130">Intent Alignment</text>
  <text class="sublabel" x="30" y="146">(query-to-doc match)</text>
  <rect class="bar-bg" x="240" y="120" width="300" height="20"/>
  <rect class="bar-2" x="240" y="120" width="120" height="20"/>
  <text class="pct" x="554" y="135" text-anchor="end">20%</text>

  <!-- Source Authority - 15% -->
  <text class="label" x="30" y="180">Source Authority</text>
  <text class="sublabel" x="30" y="196">(repo/doc ranking)</text>
  <rect class="bar-bg" x="240" y="170" width="300" height="20"/>
  <rect class="bar-3" x="240" y="170" width="90" height="20"/>
  <text class="pct" x="554" y="185" text-anchor="end">15%</text>

  <!-- Quality Score - 15% -->
  <text class="label" x="30" y="230">Quality Score</text>
  <text class="sublabel" x="30" y="246">(gold-tier gate)</text>
  <rect class="bar-bg" x="240" y="220" width="300" height="20"/>
  <rect class="bar-4" x="240" y="220" width="90" height="20"/>
  <text class="pct" x="554" y="235" text-anchor="end">15%</text>

  <!-- Usefulness - 10% -->
  <text class="label" x="30" y="280">Usefulness</text>
  <text class="sublabel" x="30" y="296">(historical signal)</text>
  <rect class="bar-bg" x="240" y="270" width="300" height="20"/>
  <rect class="bar-5" x="240" y="270" width="60" height="20"/>
  <text class="pct" x="554" y="285" text-anchor="end">10%</text>
</svg>
