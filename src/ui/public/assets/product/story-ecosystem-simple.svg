<svg viewBox="0 0 1200 800" width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
    <!-- Subtle linear gradient for elements -->
    <linearGradient id="elementGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="answerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="#0B1426"/>

  <!-- Core Insight Callout -->
  <rect x="50" y="50" width="1100" height="60" rx="10" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="2"/>
  <text x="600" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#F59E0B" text-anchor="middle">
    Seamlessly transforms questions into comprehensive, safe answers.
  </text>

  <!-- Flow elements - Row 1 -->
  <g transform="translate(0, 250)">
    <!-- 1. USER -->
    <g class="step" transform="translate(100, 0)">
      <circle cx="50" cy="50" r="30" fill="#e2e8f0"/>
      <path d="M50,80 C35,80 20,100 20,120 L80,120 C80,100 65,80 50,80 Z" fill="#e2e8f0"/>
      <rect x="10" y="10" width="80" height="40" rx="8" fill="#3B82F6" opacity="0.8"/>
      <text x="50" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">How do swarms work?</text>
      <text x="50" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">User Query</text>
    </g>

    <line x1="220" y1="90" x2="300" y2="90" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="260" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">asks</text>

    <!-- 2. ASK-RUVNET (AI Assistant) -->
    <g class="step" transform="translate(300, 0)">
      <rect x="25" y="40" width="100" height="70" rx="8" fill="url(#elementGradient)"/>
      <rect x="35" y="50" width="80" height="40" fill="#0B1426"/>
      <path d="M25,110 L125,110 L115,120 L35,120 Z" fill="url(#elementGradient)"/>
      <text x="75" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">AI Assistant</text>
      <text x="75" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Interprets request</text>
    </g>

    <line x1="450" y1="90" x2="530" y2="90" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="490" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">routes</text>

    <!-- 3. RUVECTOR (Finds the answer) -->
    <g class="step" transform="translate(530, 0)">
      <circle cx="75" cy="75" r="40" fill="url(#elementGradient)"/>
      <circle cx="75" cy="75" r="25" fill="#0B1426"/>
      <path d="M105,105 L140,140 M110,100 L145,135" stroke="url(#elementGradient)" stroke-width="10" stroke-linecap="round"/>
      <text x="75" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Find &amp; Retrieve</text>
      <text x="75" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">2ms semantic search</text>
    </g>

    <line x1="680" y1="90" x2="760" y2="90" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="720" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">forges</text>

    <!-- 4. RUFLO (Coordinates) -->
    <g class="step" transform="translate(760, 0)">
      <rect x="25" y="40" width="100" height="80" rx="8" fill="url(#elementGradient)"/>
      <circle cx="50" cy="65" r="20" fill="#e2e8f0"/>
      <circle cx="75" cy="50" r="20" fill="#e2e8f0"/>
      <circle cx="100" cy="65" r="20" fill="#e2e8f0"/>
      <path d="M50,85 C40,85 30,100 30,110 L70,110 C70,100 60,85 50,85 Z" fill="#e2e8f0"/>
      <path d="M75,70 C65,70 55,85 55,95 L95,95 C95,85 85,70 75,70 Z" fill="#e2e8f0"/>
      <path d="M100,85 C90,85 80,100 80,110 L120,110 C120,100 110,85 100,85 Z" fill="#e2e8f0"/>
      <text x="75" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Orchestrates</text>
      <text x="75" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Coordinates response</text>
    </g>
  </g>

  <!-- Connecting arrow from RUFLO (end of Row 1) to PI BRAIN (start of Row 2) -->
  <path d="M890,340 C950,390 270,390 220,440" fill="none" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="580" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">enriches</text>

  <!-- Flow elements - Row 2 -->
  <g transform="translate(0, 450)">
    <!-- 5. PI BRAIN (Community knowledge added) -->
    <g class="step" transform="translate(100, 0)">
      <path d="M80,30 Q95,10 110,30 Q125,50 110,70 Q95,90 80,70 Q65,90 50,70 Q35,50 50,30 Q65,10 80,30 Z M80,30 C70,0 60,0 50,30 C40,0 30,0 20,30 C10,60 10,90 20,120 C30,150 60,150 80,120 C100,150 130,150 140,120 C150,90 150,60 140,30 C130,0 120,0 110,30 Z" fill="url(#brainGradient)"/>
      <text x="75" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Community Brain</text>
      <text x="75" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Augments &amp; refines</text>
    </g>

    <line x1="250" y1="90" x2="330" y2="90" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="290" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">validates</text>

    <!-- 6. AIMDS (Safety checked) -->
    <g class="step" transform="translate(330, 0)">
      <path d="M75,10 L140,35 L140,75 C140,115 75,140 75,140 C75,140 10,115 10,75 L10,35 Z" fill="url(#shieldGradient)"/>
      <text x="75" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Safety Check</text>
      <text x="75" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Ensures accuracy</text>
    </g>

    <line x1="480" y1="90" x2="560" y2="90" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="520" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">delivers</text>

    <!-- 7. ANSWER (speech bubble with rich response) -->
    <g class="step" transform="translate(560, 0)">
      <rect x="0" y="20" width="200" height="120" rx="15" fill="url(#answerGradient)"/>
      <path d="M20,140 L40,160 L60,140 Z" fill="url(#answerGradient)"/>
      <text x="100" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle">Rich Answer</text>
      <!-- Icons for rich content -->
      <g transform="translate(25, 75)" fill="#e2e8f0">
        <!-- Text icon -->
        <rect x="0" y="0" width="30" height="20" rx="3"/>
        <line x1="5" y1="5" x2="25" y2="5" stroke="#0B1426" stroke-width="2"/>
        <line x1="5" y1="10" x2="25" y2="10" stroke="#0B1426" stroke-width="2"/>
        <line x1="5" y1="15" x2="20" y2="15" stroke="#0B1426" stroke-width="2"/>
      </g>
      <g transform="translate(85, 75)" fill="#e2e8f0">
        <!-- Diagram (Bar Chart) icon -->
        <rect x="0" y="0" width="30" height="20" rx="3"/>
        <rect x="5" y="10" width="5" height="8" fill="#0B1426"/>
        <rect x="13" y="5" width="5" height="13" fill="#0B1426"/>
        <rect x="21" y="0" width="5" height="18" fill="#0B1426"/>
      </g>
      <g transform="translate(145, 75)" fill="#e2e8f0">
        <!-- Examples (List) icon -->
        <rect x="0" y="0" width="30" height="20" rx="3"/>
        <circle cx="5" cy="5" r="2" fill="#0B1426"/>
        <line x1="10" y1="5" x2="25" y2="5" stroke="#0B1426" stroke-width="2"/>
        <circle cx="5" cy="12" r="2" fill="#0B1426"/>
        <line x1="10" y1="12" x2="20" y2="12" stroke="#0B1426" stroke-width="2"/>
      </g>
      <text x="100" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Final Answer</text>
    </g>
  </g>

  <!-- Stats Bar at the bottom -->
  <g transform="translate(0, 700)">
    <rect x="50" y="0" width="1100" height="70" rx="10" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
    <text x="600" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
      24,000+ GitHub Stars | 106K+ Downloads/mo | 80+ Rust Crates | 381 KB Articles
    </text>
  </g>
</svg>