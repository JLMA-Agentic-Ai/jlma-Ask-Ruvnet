<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 340" width="550" height="340">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #e0e0e0; }
    .title { font-size: 18px; font-weight: 700; }
    .label { font-size: 13px; font-weight: 600; }
    .detail { font-size: 10px; fill: #999; }
    .pct { font-size: 13px; font-weight: 700; }
  </style>
  <rect width="550" height="340" rx="12" fill="#1a1a2e"/>
  <text x="275" y="35" text-anchor="middle" class="title">5-Factor Relevance Scoring</text>

  <!-- Semantic similarity - 40% -->
  <text x="40" y="78" class="label">Semantic similarity</text>
  <rect x="230" y="64" width="200" height="20" rx="4" fill="#0f3460"/>
  <rect x="230" y="64" width="200" height="20" rx="4" fill="#00d4ff" opacity="0.8"/>
  <text x="445" y="79" class="pct" fill="#00d4ff">40%</text>
  <text x="40" y="95" class="detail">(HNSW cosine, 384d ONNX)</text>

  <!-- Intent alignment - 20% -->
  <text x="40" y="138" class="label">Intent alignment</text>
  <rect x="230" y="124" width="200" height="20" rx="4" fill="#0f3460"/>
  <rect x="230" y="124" width="100" height="20" rx="4" fill="#7c3aed" opacity="0.8"/>
  <text x="445" y="139" class="pct" fill="#7c3aed">20%</text>
  <text x="40" y="155" class="detail">(query type matches doc intent)</text>

  <!-- Source authority - 15% -->
  <text x="40" y="198" class="label">Source authority</text>
  <rect x="230" y="184" width="200" height="20" rx="4" fill="#0f3460"/>
  <rect x="230" y="184" width="75" height="20" rx="4" fill="#10b981" opacity="0.8"/>
  <text x="445" y="199" class="pct" fill="#10b981">15%</text>
  <text x="40" y="215" class="detail">(repo + doc type ranking)</text>

  <!-- Quality score - 15% -->
  <text x="40" y="258" class="label">Quality score</text>
  <rect x="230" y="244" width="200" height="20" rx="4" fill="#0f3460"/>
  <rect x="230" y="244" width="75" height="20" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="445" y="259" class="pct" fill="#f59e0b">15%</text>
  <text x="40" y="275" class="detail">(gold-tier gate, avg 92.1)</text>

  <!-- Usefulness - 10% -->
  <text x="40" y="318" class="label">Usefulness</text>
  <rect x="230" y="304" width="200" height="20" rx="4" fill="#0f3460"/>
  <rect x="230" y="304" width="50" height="20" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="445" y="319" class="pct" fill="#ef4444">10%</text>
  <text x="40" y="335" class="detail">(historical relevance signal)</text>
</svg>