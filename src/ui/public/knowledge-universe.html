<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ask Ruvnet Knowledge Universe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: white;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .atmosphere {
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 120% 80% at 50% 50%, rgba(78,205,196,0.06) 0%, transparent 50%),
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(139,92,246,0.05) 0%, transparent 40%),
                radial-gradient(ellipse 60% 80% at 80% 80%, rgba(236,72,153,0.04) 0%, transparent 40%);
            pointer-events: none; z-index: 0;
        }
        .stars {
            position: fixed; inset: 0;
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 50px 80px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 100px 40px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 150px 150px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 200px 60px, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 300px 120px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 400px 200px, rgba(255,255,255,0.3), transparent);
            background-size: 550px 550px;
            animation: twinkle 8s ease-in-out infinite alternate;
            pointer-events: none; z-index: 0;
        }
        @keyframes twinkle { from { opacity: 0.5; } to { opacity: 1; } }
        @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        #canvas {
            position: fixed; top: 0; left: 0; z-index: 10;
            width: 100vw; height: 100vh;
            cursor: grab; background: transparent;
        }
        #canvas:active { cursor: grabbing; }

        /* Title Bar */
        #title-bar {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 100; pointer-events: none;
        }
        #title-bar h1 {
            font-size: 1.8em; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(135deg, #4ecdc4 0%, #8b5cf6 40%, #ec4899 70%, #f59e0b 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        #title-bar .subtitle { color: #64748b; font-size: 0.85em; margin-top: 2px; }

        /* Search */
        #search-container {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            z-index: 200; width: 360px;
        }
        #search-input {
            width: 100%; padding: 10px 16px 10px 38px;
            background: rgba(10,20,40,0.95); border: 1px solid rgba(100,150,255,0.25);
            border-radius: 12px; color: #e2e8f0; font-size: 0.9em;
            outline: none; backdrop-filter: blur(10px);
        }
        #search-input:focus { border-color: rgba(78,205,196,0.6); }
        #search-input::placeholder { color: #475569; }
        .search-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: #475569; font-size: 0.9em; pointer-events: none;
        }
        #search-results {
            position: absolute; top: 100%; left: 0; right: 0;
            background: rgba(10,20,40,0.98); border: 1px solid rgba(100,150,255,0.2);
            border-radius: 10px; margin-top: 4px; max-height: 300px;
            overflow-y: auto; display: none; backdrop-filter: blur(20px);
        }
        .search-result-item {
            padding: 10px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.15s;
        }
        .search-result-item:hover { background: rgba(78,205,196,0.1); }
        .search-result-item:last-child { border-bottom: none; }
        .sr-title { font-size: 0.85em; color: #e2e8f0; }
        .sr-path { font-size: 0.7em; color: #64748b; margin-top: 2px; }
        .sr-badge {
            display: inline-block; font-size: 0.65em; padding: 1px 6px;
            border-radius: 4px; margin-left: 6px; vertical-align: middle;
        }

        /* Stats Bar */
        #stats-bar {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 24px; z-index: 100;
            background: rgba(10,20,40,0.9); border: 1px solid rgba(100,150,255,0.15);
            border-radius: 10px; padding: 8px 20px; backdrop-filter: blur(10px);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.1em; font-weight: 700; color: #4ecdc4; }
        .stat-label { font-size: 0.65em; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        /* Categories Panel */
        #categories-panel {
            position: fixed; left: 16px; top: 110px; width: 240px;
            max-height: calc(100vh - 180px);
            background: linear-gradient(135deg, rgba(10,20,40,0.95), rgba(15,25,45,0.95));
            border: 1px solid rgba(100,150,255,0.15); border-radius: 12px;
            padding: 14px; overflow-y: auto; z-index: 100; backdrop-filter: blur(10px);
        }
        #categories-panel h4 {
            font-size: 0.65em; color: #4ecdc4; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 10px;
        }
        .cat-item {
            display: flex; align-items: center; padding: 8px 10px; margin: 3px 0;
            border-radius: 8px; cursor: pointer; transition: all 0.2s; opacity: 0.7;
        }
        .cat-item:hover { background: rgba(255,255,255,0.06); opacity: 1; }
        .cat-item.active { background: rgba(78,205,196,0.15); border: 1px solid rgba(78,205,196,0.3); opacity: 1; }
        .cat-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 6px currentColor; flex-shrink: 0; }
        .cat-name { font-size: 0.8em; color: #94a3b8; flex: 1; }
        .cat-item.active .cat-name { color: #fff; }
        .cat-count { font-size: 0.65em; color: #475569; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 8px; }

        /* Info Panel */
        #info-panel {
            position: fixed; top: 16px; right: 16px; width: 380px;
            max-height: calc(100vh - 80px);
            background: linear-gradient(135deg, rgba(10,20,40,0.97), rgba(15,25,45,0.97));
            border: 1px solid rgba(100,150,255,0.2); border-radius: 14px;
            padding: 18px; overflow-y: auto; z-index: 100; backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px -15px rgba(0,0,0,0.5);
            display: none;
        }
        #info-panel.visible { display: block; animation: fadeIn 0.3s ease; }
        #info-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            border-radius: 14px 14px 0 0;
            background: linear-gradient(90deg, #4ecdc4, #8b5cf6, #ec4899);
        }
        .info-back {
            font-size: 0.8em; color: #4ecdc4; cursor: pointer; margin-bottom: 10px;
            display: inline-block; transition: color 0.2s;
        }
        .info-back:hover { color: #6ee7de; }
        #info-title { font-size: 1.3em; font-weight: 700; margin-bottom: 6px; }
        .info-badge {
            display: inline-block; padding: 3px 10px; border-radius: 6px;
            font-size: 0.75em; font-weight: 600; margin-bottom: 10px;
        }
        #info-desc { font-size: 0.85em; color: #94a3b8; line-height: 1.5; margin-bottom: 14px; }
        .info-section-title {
            font-size: 0.7em; color: #4ecdc4; text-transform: uppercase;
            letter-spacing: 1.5px; margin: 14px 0 8px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .info-list-item {
            padding: 8px 10px; margin: 3px 0; border-radius: 6px;
            cursor: pointer; transition: background 0.15s; font-size: 0.82em;
            color: #cbd5e1; display: flex; align-items: center; gap: 8px;
        }
        .info-list-item:hover { background: rgba(255,255,255,0.06); }
        .info-list-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .info-detail { font-size: 0.82em; color: #94a3b8; line-height: 1.6; }
        .info-detail p { margin-bottom: 8px; }
        .info-tag {
            display: inline-block; font-size: 0.7em; padding: 2px 8px;
            border-radius: 4px; margin: 2px; background: rgba(78,205,196,0.1);
            color: #4ecdc4; border: 1px solid rgba(78,205,196,0.2);
        }

        /* Breadcrumb */
        #breadcrumb {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; align-items: center; gap: 4px;
            background: rgba(10,20,40,0.9); border: 1px solid rgba(100,150,255,0.12);
            border-radius: 8px; padding: 6px 14px; backdrop-filter: blur(10px);
        }
        .bc-item { font-size: 0.75em; color: #64748b; cursor: pointer; transition: color 0.2s; }
        .bc-item:hover { color: #4ecdc4; }
        .bc-item.current { color: #e2e8f0; cursor: default; }
        .bc-sep { font-size: 0.7em; color: #334155; }

        /* Controls hint */
        #controls-hint {
            position: fixed; bottom: 16px; right: 16px; z-index: 100;
            font-size: 0.7em; color: #475569; text-align: right;
        }
        #controls-hint kbd {
            background: rgba(255,255,255,0.08); padding: 1px 5px;
            border-radius: 3px; font-size: 0.9em;
        }

        /* Loading */
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 999; text-align: center;
        }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(78,205,196,0.2); border-top-color: #4ecdc4;
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;
        }

        /* Click prompt */
        #click-prompt {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; text-align: center; pointer-events: none;
            animation: pulse 2s ease-in-out infinite;
        }
        #click-prompt .text { font-size: 1.1em; color: #4ecdc4; font-weight: 300; }

        /* Zoom controls */
        #zoom-controls {
            position: fixed; bottom: 100px; right: 16px; z-index: 100;
            display: flex; flex-direction: column; gap: 4px;
        }
        .zoom-btn {
            width: 36px; height: 36px; background: rgba(10,20,40,0.9);
            border: 1px solid rgba(100,150,255,0.2); border-radius: 8px;
            color: #94a3b8; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .zoom-btn:hover { background: rgba(78,205,196,0.15); border-color: rgba(78,205,196,0.4); color: #fff; }

        /* Responsive */
        @media (max-width: 1200px) {
            #categories-panel { width: 200px; }
            #info-panel { width: 320px; }
        }
        @media (max-width: 900px) {
            #categories-panel { display: none; }
            #info-panel { width: 280px; right: 8px; top: 8px; }
            #search-container { width: 280px; }
        }
        @media (max-width: 600px) {
            #info-panel { width: 100%; right: 0; top: auto; bottom: 0; max-height: 50vh; border-radius: 14px 14px 0 0; }
            #title-bar h1 { font-size: 1.2em; }
            #search-container { width: 220px; top: 56px; }
            #stats-bar { gap: 12px; padding: 6px 12px; }
        }

        .hidden { display: none !important; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(78,205,196,0.3); border-radius: 2px; }
    </style>
</head>
<body>
    <div id="loading"><div class="loading-spinner"></div><div>Loading Knowledge Universe...</div></div>
    <div class="atmosphere"></div>
    <div class="stars"></div>
    <div id="title-bar">
        <h1>Ask Ruvnet Knowledge Universe</h1>
        <div class="subtitle">323 Knowledge Nodes | Claude Flow v3.1.0</div>
    </div>
    <div id="search-container">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search-input" placeholder="Search knowledge base..." autocomplete="off">
        <div id="search-results"></div>
    </div>
    <div id="categories-panel"><h4>Domains</h4><div id="cat-list"></div></div>
    <div id="info-panel"><div id="info-content"></div></div>
    <div id="breadcrumb"></div>
    <div id="stats-bar">
        <div class="stat-item"><div class="stat-value">289</div><div class="stat-label">Entries</div></div>
        <div class="stat-item"><div class="stat-value">15</div><div class="stat-label">Categories</div></div>
        <div class="stat-item"><div class="stat-value">98.5</div><div class="stat-label">Avg Quality</div></div>
        <div class="stat-item"><div class="stat-value">5</div><div class="stat-label">Depth Levels</div></div>
    </div>
    <div id="click-prompt"><div class="text">Click the central orb to explore</div></div>
    <div id="controls-hint">
        <div><kbd>Drag</kbd> Rotate &nbsp; <kbd>Scroll</kbd> Zoom</div>
        <div><kbd>R</kbd> Reset &nbsp; <kbd>Esc</kbd> Back</div>
    </div>
    <div id="zoom-controls">
        <button class="zoom-btn" id="btn-zin" title="Zoom In">+</button>
        <button class="zoom-btn" id="btn-zout" title="Zoom Out">-</button>
        <button class="zoom-btn" id="btn-zreset" title="Reset">R</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="knowledge-universe.js"></script>
</body>
</html>
