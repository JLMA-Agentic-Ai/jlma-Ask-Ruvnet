  <ellipse cx="500" cy="620" rx="15" ry="5" fill="#E2E8F0" opacity="0.8"/>
  <ellipse cx="500" cy="660" rx="15" ry="5" fill="#E2E8F0" opacity="0.8"/>
  <text x="500" y="645" font-family="system-ui, -apple-system, sans-serif" font-size="22px" font-weight="bold" fill="#E2E8F0" text-anchor="middle">
    RuVector DB
  </text>
  <text x="500" y="670" font-family="system-ui, -apple-system, sans-serif" font-size="14px" fill="#E2E8F0" text-anchor="middle">
