<svg viewBox="0 0 1200 800" width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="#0B1426"/>

  <!-- Global Styles -->
  <style>
    .label {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 22px;
      font-weight: bold;
      fill: #e2e8f0;
    }
    .sub-label {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      fill: #cbd5e1;
    }
    .metric-badge {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: bold;
      fill: #0B1426;
    }
    .insight-text {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: bold;
      fill: #F97316; /* Orange for impact */
    }
    .agent-label {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: bold;
      fill: #e2e8f0;
    }
  </style>

  <!-- TOP SECTION: Without Ruflo (Solo Developer) -->
  <text x="100" y="80" class="label" fill="#F59E0B">Without Ruflo</text>
  <text x="100" y="110" class="sub-label">Solo Developer</text>

  <!-- Solo Developer Person Icon -->
  <g transform="translate(200, 200)" filter="url(#shadow)">
    <circle cx="0" cy="-30" r="25" fill="#e2e8f0"/> <!-- Head -->
    <rect x="-20" y="-10" width="40" height="60" rx="8" fill="#F59E0B"/> <!-- Body -->
    <rect x="-30" y="10" width="20" height="10" rx="4" fill="#F59E0B"/> <!-- Left Arm -->
    <rect x="10" y="10" width="20" height="10" rx="4" fill="#F59E0B"/> <!-- Right Arm -->
    <rect x="-10" y="50" width="10" height="20" rx="4" fill="#F59E0B"/> <!-- Left Leg -->
    <rect x="0" y="50" width="10" height="20" rx="4" fill="#F59E0B"/> <!-- Right Leg -->
    <rect x="-70" y="30" width="140" height="20" rx="8" fill="#475569"/> <!-- Desk -->
  </g>

  <!-- Overwhelmed Tasks (8 icons piled up) -->
  <g transform="translate(300, 180)">
    <!-- Task Icons -->
    <g transform="translate(0,0)" fill="#F59E0B" filter="url(#shadow)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#1e293b"/>
      <path d="M10 10l5 5M10 15l5-5M12.5 5a7.5 7.5 0 100 15 7.5 7.5 0 000-15z" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(2.5,2.5) scale(0.8)"/> <!-- Debug -->
    </g>
    <g transform="translate(20, -10)" fill="#F59E0B" filter="url(#shadow)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#1e293b"/>
      <path d="M7 15l4 4L19 9" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(0,0) scale(0.8)"/> <!-- Test -->
    </g>
    <g transform="translate(40, 10)" fill="#F59E0B" filter="url(#shadow)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#1e293b"/>
      <path d="M12 20h9M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(0,0) scale(0.8)"/> <!-- Writer -->
    </g>
    <g transform="translate(60, -20)" fill="#F59E0B" filter="url(#shadow)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#1e293b"/>
      <path d="M18 16l-4 4-4-4M14 20v-8m8-10l-4 4-4-4M14 4v8" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(-2,0) scale(0.8)"/> <!-- Code -->
    </g>
    <g transform="translate(80, 0)" fill="#F59E0B" filter="url(#shadow)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#1e293b"/>
      <path d="M12 2l-5 10h10zM12 20v-8m-4 4h8" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(0,0) scale(0.8)"/> <!-- Deploy -->
    </g>
    <g transform="translate(100, -30)" fill="#F59E0B" filter="url(#shadow)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#1e293b"/>
      <path d="M2 12L7 7L12 12L17 7L22 12" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(-2,0) scale(0.8)"/> <!-- Monitor -->
    </g>
    <g transform="translate(120, -10)" fill="#F59E0B" filter="url(#shadow)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#1e293b"/>
      <circle cx="10" cy="10" r="7" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(0,0) scale(0.8)"/><path d="M15 15l6 6" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(0,0) scale(0.8)"/> <!-- Research -->
    </g>
    <g transform="translate(140, 20)" fill="#F59E0B" filter="url(#shadow)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#1e293b"/>
      <path d="M12 5C5 5 2 12 2 12s3 7 10 7 10-7 10-7S19 5 12 5zm0 10a3 3 0 110-6 3 3 0 010 6z" stroke="#F59E0B" stroke-width="2" fill="none" transform="translate(0,0) scale(0.8)"/> <!-- Review -->
    </g>
  </g>


  <!-- Thought Bubble -->
  <g transform="translate(450, 180)" filter="url(#shadow)">
    <path d="M10 20 C10 20 0 15 0 10 C0 5 5 0 10 0 C15 0 20 5 20 10 C20 15 10 20 10 20 Z" fill="#e2e8f0" transform="scale(3, 2.5) translate(0, -20)"/>
    <circle cx="20" cy="40" r="8" fill="#e2e8f0"/>
    <circle cx="40" cy="50" r="5" fill="#e2e8f0"/>
    <text x="30" y="-10" text-anchor="middle" class="sub-label" fill="#0B1426">I need to do everything myself</text>
  </g>

  <!-- Solo Developer Timeline Badge -->
  <rect x="100" y="300" width="200" height="50" rx="10" fill="#F59E0B" filter="url(#shadow)"/>
  <text x="200" y="330" text-anchor="middle" class="metric-badge">5 engineers, 1 month</text>


  <!-- BOTTOM SECTION: With Ruflo (AI Team) -->
  <text x="100" y="480" class="label" fill="#6366F1">With Ruflo</text>
  <text x="100" y="510" class="sub-label">AI Team</text>

  <!-- Relaxed Developer Person Icon -->
  <g transform="translate(200, 600)" filter="url(#shadow)">
    <circle cx="0" cy="-30" r="25" fill="#e2e8f0"/> <!-- Head -->
    <rect x="-20" y="-10" width="40" height="60" rx="8" fill="#6366F1"/> <!-- Body -->
    <rect x="-50" y="10" width="30" height="10" rx="4" fill="#6366F1"/> <!-- Left Arm (relaxed) -->
    <rect x="20" y="10" width="30" height="10" rx="4" fill="#6366F1"/> <!-- Right Arm (relaxed) -->
    <rect x="-10" y="50" width="10" height="20" rx="4" fill="#6366F1"/> <!-- Left Leg -->
    <rect x="0" y="50" width="10" height="20" rx="4" fill="#6366F1"/> <!-- Right Leg -->
  </g>

  <!-- AI Agents (8 friendly robots around the person) -->
  <g transform="translate(200, 600)">
    <!-- Agent Template (Robot Face) -->
    <g id="robot-agent">
      <rect x="-25" y="-25" width="50" height="50" rx="10" fill="#3B82F6"/> <!-- Head -->
      <circle cx="-10" cy="-10" r="5" fill="#e2e8f0"/> <!-- Left Eye -->
      <circle cx="10" cy="-10" r="5" fill="#e2e8f0"/> <!-- Right Eye -->
      <rect x="-15" y="5" width="30" height="5" rx="2" fill="#e2e8f0"/> <!-- Mouth -->
    </g>

    <!-- Agent 1: Coder -->
    <g transform="translate(-150, -100)">
      <use href="#robot-agent"/>
      <path d="M-10 -5l-4 4-4-4M-14 4v-8m8-10l-4 4-4-4M-4 -4v8" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.4) translate(10,-15)"/>
      <text x="0" y="45" text-anchor="middle" class="agent-label">Coder</text>
    </g>
    <!-- Agent 2: Researcher -->
    <g transform="translate(0, -180)">
      <use href="#robot-agent"/>
      <circle cx="-10" cy="-10" r="7" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.3) translate(10,-15)"/><path d="M-5 -5l6 6" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.3) translate(10,-15)"/>
      <text x="0" y="45" text-anchor="middle" class="agent-label">Researcher</text>
    </g>
    <!-- Agent 3: Tester -->
    <g transform="translate(150, -100)">
      <use href="#robot-agent"/>
      <path d="M-10 0l4 4L10 -8" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.3) translate(10,-15)"/>
      <text x="0" y="45" text-anchor="middle" class="agent-label">Tester</text>
    </g>
    <!-- Agent 4: Reviewer -->
    <g transform="translate(220, 0)">
      <use href="#robot-agent"/>
      <path d="M-2 5C-9 5 -12 12 -12 12s3 7 10 7 10-7 10-7S5 5 -2 5zm0 10a3 3 0 110-6 3 3 0 010 6z" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.25) translate(10,-15)"/>
      <text x="0" y="45" text-anchor="middle" class="agent-label">Reviewer</text>
    </g>
    <!-- Agent 5: Deployer -->
    <g transform="translate(150, 100)">
      <use href="#robot-agent"/>
      <path d="M-2 -10l-5 10h10zM-2 10v-8m-4 4h8" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.3) translate(10,-15)"/>
      <text x="0" y="45" text-anchor="middle" class="agent-label">Deployer</text>
    </g>
    <!-- Agent 6: Monitor -->
    <g transform="translate(0, 180)">
      <use href="#robot-agent"/>
      <path d="M-12 -2L-7 -7L-2 -2L3 -7L8 -2" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.3) translate(10,-15)"/>
      <text x="0" y="45" text-anchor="middle" class="agent-label">Monitor</text>
    </g>
    <!-- Agent 7: Writer -->
    <g transform="translate(-150, 100)">
      <use href="#robot-agent"/>
      <path d="M-2 10h9M2.5 -6.5l4 4L-7 11H-11v-4L2.5 -6.5z" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.3) translate(10,-15)"/>
      <text x="0" y="45" text-anchor="middle" class="agent-label">Writer</text>
    </g>
    <!-- Agent 8: Debugger -->
    <g transform="translate(-220, 0)">
      <use href="#robot-agent"/>
      <path d="M-4 -4l4 4M-4 0l4-4M-2 -12a10 10 0 100 20 10 10 0 000-20z" stroke="#e2e8f0" stroke-width="1.5" fill="none" transform="scale(0.3) translate(10,-15)"/>
      <text x="0" y="45" text-anchor="middle" class="agent-label">Debugger</text>
    </g>

    <!-- Coordination lines (dotted) -->
    <line x1="-150" y1="-100" x2="0" y2="-180" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="0" y1="-180" x2="150" y2="-100" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="150" y1="-100" x2="220" y2="0" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="220" y1="0" x2="150" y2="100" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="150" y1="100" x2="0" y2="180" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="0" y1="180" x2="-150" y2="100" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="-150" y1="100" x2="-220" y2="0" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
    <line x1="-220" y1="0" x2="-150" y2="-100" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"/>
  </g>

  <!-- Ruflo Timeline Badge -->
  <rect x="100" y="700" width="200" height="50" rx="10" fill="#6366F1" filter="url(#shadow)"/>
  <text x="200" y="730" text-anchor="middle" class="metric-badge">1 person, 1 afternoon</text>

  <!-- Core Insight Callout -->
  <rect x="700" y="650" width="400" height="80" rx="12" fill="#F59E0B" filter="url(#shadow)"/>
  <text x="900" y="695" text-anchor="middle" class="insight-text" fill="#0B1426">One command. Instant team.</text>

</svg>