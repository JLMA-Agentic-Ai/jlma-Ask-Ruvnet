<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; stroke-width: 1.5; rx: 6; }
      .box-blue { fill: #1a1f2b; stroke: #58a6ff; stroke-width: 1.5; rx: 6; }
      .box-green { fill: #1a1f2b; stroke: #3fb950; stroke-width: 1.5; rx: 6; }
      .title { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 14px; fill: #f0f6fc; font-weight: 600; }
      .label { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 13px; fill: #c9d1d9; }
      .sublabel { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 10px; fill: #8b949e; }
      .action { font-family: -apple-system, BlinkMacSystemFont, monospace; font-size: 10px; fill: #58a6ff; }
      .arrow { stroke: #484f58; stroke-width: 2; fill: none; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#484f58"/>
    </marker>
  </defs>

  <rect class="bg" width="800" height="220" rx="8"/>
  <text class="title" x="400" y="28" text-anchor="middle">Deployment Pipeline</text>

  <!-- Local Dev -->
  <rect class="box" x="30" y="50" width="140" height="60"/>
  <text class="label" x="100" y="76" text-anchor="middle">Local Dev</text>

  <!-- GitHub -->
  <rect class="box" x="230" y="50" width="140" height="60"/>
  <text class="label" x="300" y="76" text-anchor="middle">GitHub</text>
  <text class="sublabel" x="300" y="92" text-anchor="middle">main branch</text>

  <!-- Railway -->
  <rect class="box-blue" x="430" y="50" width="140" height="60"/>
  <text class="label" x="500" y="76" text-anchor="middle">Railway</text>
  <text class="sublabel" x="500" y="92" text-anchor="middle">Docker Build</text>

  <!-- Live Prod -->
  <rect class="box-green" x="630" y="50" width="140" height="60"/>
  <text class="label" x="700" y="76" text-anchor="middle">Live Prod</text>

  <!-- Arrows -->
  <line class="arrow" x1="170" y1="80" x2="225" y2="80"/>
  <text class="action" x="198" y="72" text-anchor="middle">push</text>

  <line class="arrow" x1="370" y1="80" x2="425" y2="80"/>
  <text class="action" x="398" y="72" text-anchor="middle">auto</text>

  <line class="arrow" x1="570" y1="80" x2="625" y2="80"/>

  <!-- Dockerfile details -->
  <rect class="box" x="400" y="130" width="200" height="80"/>
  <text class="sublabel" x="500" y="148" text-anchor="middle">Dockerfile:</text>
  <text class="sublabel" x="500" y="164" text-anchor="middle">node:22-bookworm-slim</text>
  <text class="sublabel" x="500" y="180" text-anchor="middle">npm install + build frontend</text>
  <text class="sublabel" x="500" y="196" text-anchor="middle">start-railway.sh</text>

  <line x1="500" y1="110" x2="500" y2="125" stroke="#484f58" stroke-width="1" stroke-dasharray="3 2"/>
</svg>
