<svg viewBox="0 0 1200 800" width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E2E8F0" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="#0B1426"/>

  <!-- Core Insight Callout -->
  <rect x="100" y="50" width="1000" height="70" rx="12" fill="#1C2E4A" filter="url(#shadow)"/>
  <text x="600" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="24px" font-weight="bold" fill="#F59E0B" text-anchor="middle">
    Unified AI Stack for Secure, Intelligent Automation
  </text>

  <!-- AIMDS (Security Middleware) - Wrapping Layer -->
  <rect x="150" y="180" width="800" height="550" rx="12" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-width="3" filter="url(#shadow)"/>
  <!-- Shield Icon -->
  <path d="M220,200 L290,230 L290,290 C290,350 220,390 220,390 C220,390 150,350 150,290 L150,230 Z" fill="#EF4444" transform="scale(0.8) translate(50, 50)" filter="url(#shadow)"/>
  <text x="180" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="22px" font-weight="bold" fill="#EF4444" writing-mode="vertical-rl" text-orientation="upright">
    AIMDS
  </text>
  <text x="175" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="14px" fill="#DC2626" writing-mode="vertical-rl" text-orientation="upright">
    Security Middleware
  </text>

  <!-- Main Stack Elements -->
  <!-- RuVector (Bottom) -->
  <rect x="300" y="600" width="400" height="90" rx="10" fill="url(#stackGradient)" filter="url(#shadow)"/>
  <ellipse cx="500" cy="600" rx="200" ry="15" fill="#F59E0B" opacity="0.8"/>
  <ellipse cx="500" cy="690" rx="200" ry="15" fill="#F97316" opacity="0.8"/>
  <rect x="300" y="600" width="400" height="90" rx="10" fill="none" stroke="#E2E8F0" stroke-opacity="0.2"/>
