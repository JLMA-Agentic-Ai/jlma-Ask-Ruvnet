<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="700" height="450">
  <defs>
    <style>
      .outer { fill: #f8f9fa; stroke: #333333; stroke-width: 2; rx: 10; }
      .inner { fill: #ffffff; stroke: #333333; stroke-width: 1.5; rx: 6; }
      .asset-box { fill: #f0f4ff; stroke: #4a90d9; stroke-width: 1; rx: 4; }
      .title-lg { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #1a1a1a; }
      .title { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .detail { font-family: system-ui, sans-serif; font-size: 10px; fill: #666666; }
      .file { font-family: system-ui, sans-serif; font-size: 10px; fill: #1a1a1a; font-weight: 600; }
      .size { font-family: system-ui, sans-serif; font-size: 10px; fill: #4a90d9; font-weight: 600; }
      .footer { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #38a169; }
      .arrow { stroke: #555555; stroke-width: 1.5; fill: none; marker-end: url(#ah); marker-start: url(#ah-rev); }
      @media (prefers-color-scheme: dark) {
        .outer { fill: #1c2128; stroke: #768390; }
        .inner { fill: #2d333b; stroke: #768390; }
        .asset-box { fill: #2d333b; stroke: #6cb6ff; }
        .title-lg { fill: #e6edf3; }
        .title { fill: #e6edf3; }
        .detail { fill: #8b949e; }
        .file { fill: #e6edf3; }
        .size { fill: #6cb6ff; }
        .footer { fill: #3fb950; }
        .arrow { stroke: #768390; }
      }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555555" />
    </marker>
    <marker id="ah-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555555" />
    </marker>
  </defs>

  <!-- Outer: BROWSER -->
  <rect class="outer" x="20" y="20" width="660" height="370" />
  <text class="title-lg" x="40" y="48">BROWSER</text>

  <!-- Main Thread -->
  <rect class="inner" x="40" y="65" width="170" height="90" />
  <rect x="40" y="65" width="170" height="24" rx="6" ry="6" fill="#4a90d9" />
  <rect x="40" y="81" width="170" height="8" fill="#4a90d9" />
  <text class="title" x="125" y="82" text-anchor="middle" fill="#ffffff">Main Thread</text>
  <text class="detail" x="125" y="110" text-anchor="middle">React UI</text>
  <text class="detail" x="125" y="126" text-anchor="middle">User interactions</text>

  <!-- Arrow Main <-> Embedding -->
  <line class="arrow" x1="214" y1="110" x2="262" y2="110" />

  <!-- Embedding Worker -->
  <rect class="inner" x="266" y="65" width="170" height="90" />
  <rect x="266" y="65" width="170" height="24" rx="6" ry="6" fill="#38a169" />
  <rect x="266" y="81" width="170" height="8" fill="#38a169" />
  <text class="title" x="351" y="82" text-anchor="middle" fill="#ffffff">Embedding Worker</text>
  <text class="detail" x="351" y="110" text-anchor="middle">MiniLM-L6</text>
  <text class="detail" x="351" y="126" text-anchor="middle">384-dim vectors</text>

  <!-- Arrow Embedding <-> Search -->
  <line class="arrow" x1="440" y1="110" x2="488" y2="110" />

  <!-- Search Worker -->
  <rect class="inner" x="492" y="65" width="170" height="90" />
  <rect x="492" y="65" width="170" height="24" rx="6" ry="6" fill="#805ad5" />
  <rect x="492" y="81" width="170" height="8" fill="#805ad5" />
  <text class="title" x="577" y="82" text-anchor="middle" fill="#ffffff">Search Worker</text>
  <text class="detail" x="577" y="110" text-anchor="middle">WASM HNSW</text>
  <text class="detail" x="577" y="126" text-anchor="middle">41 KB binary</text>

  <!-- Assets Box -->
  <rect x="40" y="185" width="622" height="170" rx="8" fill="none" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="6,3" />
  <text class="title" x="60" y="210" fill="#4a90d9">ASSETS (No Server Needed)</text>

  <!-- Asset row 1 -->
  <rect class="asset-box" x="60" y="222" width="270" height="28" />
  <text class="file" x="72" y="240">knowledge-sq8.bin</text>
  <text class="size" x="310" y="240" text-anchor="end">132 KB</text>

  <rect class="asset-box" x="350" y="222" width="290" height="28" />
  <text class="file" x="362" y="240">sq8-params.bin</text>
  <text class="size" x="620" y="240" text-anchor="end">3 KB</text>

  <!-- Asset row 2 -->
  <rect class="asset-box" x="60" y="260" width="270" height="28" />
  <text class="file" x="72" y="278">knowledge-meta.json</text>
  <text class="size" x="310" y="278" text-anchor="end">17 KB</text>

  <rect class="asset-box" x="350" y="260" width="290" height="28" />
  <text class="file" x="362" y="278">gold-content.json</text>
  <text class="size" x="620" y="278" text-anchor="end">1.4 MB</text>

  <!-- Asset row 3 -->
  <rect class="asset-box" x="60" y="298" width="270" height="28" />
  <text class="file" x="72" y="316">rvf_wasm_bg.wasm</text>
  <text class="size" x="310" y="316" text-anchor="end">41 KB</text>

  <!-- Footer -->
  <text class="footer" x="350" y="410" text-anchor="middle">Total: ~1.6 MB | Search: &lt;5ms | No internet required</text>
</svg>