<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" width="720" height="500">
  <rect width="720" height="500" fill="#1a1a2e"/>
  <!-- Header -->
  <rect x="10" y="10" width="700" height="38" rx="3" fill="#0f3460" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="360" y="34" fill="#4a9eff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">FEDERATED KB ARCHITECTURE</text>
  <!-- UTILITIES box (left) -->
  <rect x="40" y="75" width="270" height="200" rx="4" fill="#16213e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="175" y="100" fill="#4ade80" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">UTILITIES</text>
  <text x="175" y="118" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">(Shared)</text>
  <text x="175" y="136" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Port: 5435</text>
  <line x1="52" y1="143" x2="298" y2="143" stroke="#4ade80" stroke-width="0.5" opacity="0.4"/>
  <text x="175" y="163" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">• Calculations</text>
  <text x="175" y="182" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">• Tables / charts</text>
  <text x="175" y="201" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">• Shared tools</text>
  <text x="175" y="220" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">• Generic docs</text>
  <!-- BUSINESS KB box (right) -->
  <rect x="410" y="75" width="270" height="200" rx="4" fill="#16213e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="545" y="100" fill="#a78bfa" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">BUSINESS KB</text>
  <text x="545" y="118" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">(Isolated)</text>
  <text x="545" y="136" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Port: 5436+</text>
  <line x1="422" y1="143" x2="668" y2="143" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
  <text x="545" y="163" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">• Domain rules</text>
  <text x="545" y="182" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">• Decisions</text>
  <text x="545" y="201" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">• Regulations</text>
  <text x="545" y="220" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">• Case studies</text>
  <!-- Lines merging down to QUERY ROUTER -->
  <line x1="175" y1="277" x2="175" y2="320" stroke="#64748b" stroke-width="2"/>
  <line x1="175" y1="320" x2="360" y2="320" stroke="#64748b" stroke-width="2"/>
  <line x1="545" y1="277" x2="545" y2="320" stroke="#64748b" stroke-width="2"/>
  <line x1="545" y1="320" x2="360" y2="320" stroke="#64748b" stroke-width="2"/>
  <line x1="360" y1="320" x2="360" y2="360" stroke="#64748b" stroke-width="2"/>
  <polygon points="355,357 360,367 365,357" fill="#64748b"/>
  <!-- QUERY ROUTER box -->
  <rect x="220" y="367" width="280" height="100" rx="4" fill="#16213e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="360" y="392" fill="#fb923c" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">QUERY ROUTER</text>
  <line x1="232" y1="399" x2="488" y2="399" stroke="#fb923c" stroke-width="0.5" opacity="0.4"/>
  <text x="360" y="420" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Primary: Business KB</text>
  <text x="360" y="440" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Supplement: Utilities</text>
  <text x="360" y="460" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Keyword → fast path · Embedding → semantic path</text>
  <!-- Labels below boxes -->
  <text x="175" y="300" fill="#475569" font-family="monospace" font-size="10" text-anchor="middle">Always supplemental</text>
  <text x="545" y="300" fill="#475569" font-family="monospace" font-size="10" text-anchor="middle">Domain-specific primary</text>
</svg>
