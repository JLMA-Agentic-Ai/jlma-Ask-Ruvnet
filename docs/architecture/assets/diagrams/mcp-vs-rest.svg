<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <rect width="700" height="380" fill="#1a1a2e"/>
  <!-- KNOWLEDGE BASE box at top center -->
  <rect x="220" y="20" width="260" height="60" rx="4" fill="#0f3460" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="350" y="44" fill="#4a9eff" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">KNOWLEDGE BASE</text>
  <text x="350" y="62" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">(ruvector-postgres)</text>
  <!-- Fork lines from KB -->
  <line x1="350" y1="80" x2="350" y2="110" stroke="#64748b" stroke-width="2"/>
  <line x1="350" y1="110" x2="175" y2="110" stroke="#64748b" stroke-width="2"/>
  <line x1="350" y1="110" x2="525" y2="110" stroke="#64748b" stroke-width="2"/>
  <line x1="175" y1="110" x2="175" y2="145" stroke="#64748b" stroke-width="2"/>
  <polygon points="170,142 175,152 180,142" fill="#64748b"/>
  <line x1="525" y1="110" x2="525" y2="145" stroke="#64748b" stroke-width="2"/>
  <polygon points="520,142 525,152 530,142" fill="#64748b"/>
  <!-- MCP Server box (left) -->
  <rect x="60" y="152" width="230" height="90" rx="4" fill="#16213e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="175" y="177" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">MCP Server</text>
  <line x1="72" y1="184" x2="278" y2="184" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
  <text x="175" y="202" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">AI agent workflows</text>
  <text x="175" y="218" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Claude Code integration</text>
  <!-- REST API box (right) -->
  <rect x="410" y="152" width="230" height="90" rx="4" fill="#16213e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="525" y="177" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">REST API</text>
  <line x1="422" y1="184" x2="628" y2="184" stroke="#4ade80" stroke-width="0.5" opacity="0.5"/>
  <text x="525" y="202" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Production web apps</text>
  <text x="525" y="218" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Mobile &amp; third-party</text>
  <!-- Arrows down from MCP and REST -->
  <line x1="175" y1="244" x2="175" y2="284" stroke="#64748b" stroke-width="2"/>
  <polygon points="170,281 175,291 180,281" fill="#64748b"/>
  <line x1="525" y1="244" x2="525" y2="284" stroke="#64748b" stroke-width="2"/>
  <polygon points="520,281 525,291 530,281" fill="#64748b"/>
  <!-- Claude Code box (left bottom) -->
  <rect x="60" y="291" width="230" height="60" rx="4" fill="#16213e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="175" y="316" fill="#fb923c" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Claude Code</text>
  <text x="175" y="337" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Dev · Debug · Maintenance</text>
  <!-- Production Apps box (right bottom) -->
  <rect x="410" y="291" width="230" height="60" rx="4" fill="#16213e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="525" y="316" fill="#fb923c" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Production Apps</text>
  <text x="525" y="337" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Scaled · Versioned · Cached</text>
  <!-- Labels -->
  <text x="175" y="368" fill="#475569" font-family="monospace" font-size="10" text-anchor="middle">Development-time power tool</text>
  <text x="525" y="368" fill="#475569" font-family="monospace" font-size="10" text-anchor="middle">Production-time interface</text>
</svg>
