<svg viewBox="0 0 1200 800" width="1200" height="800" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
    <defs>
        <!-- Gradients -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0B1426;" />
            <stop offset="100%" style="stop-color:#1A253C;" />
        </linearGradient>
        <linearGradient id="inputGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#1D4ED8" />
        </linearGradient>
        <linearGradient id="outputGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#10B981" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#F59E0B" />
            <stop offset="100%" stop-color="#D97706" />
        </linearGradient>
        <linearGradient id="stageGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6366F1" />
            <stop offset="100%" stop-color="#4F46E5" />
        </linearGradient>
        <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#3F3F46" />
            <stop offset="100%" stop-color="#27272A" />
        </linearGradient>

        <!-- Arrowhead Marker -->
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#e2e8f0" />
        </marker>

        <!-- Subtle Shadow Filter -->
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="1200" height="800" fill="url(#bgGradient)" />

    <!-- Core Insight Callout -->
    <rect x="100" y="40" width="1000" height="60" rx="12" fill="#F97316" filter="url(#shadow)"/>
    <text x="600" y="78" text-anchor="middle" font-size="24px" fill="#e2e8f0" font-weight="bold">
        RVF transforms raw knowledge into highly-dense, self-explaining gold.
    </text>

    <!-- Input Block -->
    <g filter="url(#shadow)">
        <rect x="80" y="180" width="200" height="280" rx="12" fill="url(#inputGradient)" />
        <path d="M180,220 L230,240 L230,280 C230,310 180,320 180,320 C180,320 130,310 130,280 L130,240 Z" fill="#e2e8f0" transform="scale(0.8) translate(45, 80)" />
        <text x="180" y="340" text-anchor="middle" font-size="20px" fill="#e2e8f0" font-weight="bold">Raw Knowledge</text>
        <text x="180" y="365" text-anchor="middle" font-size="14px" fill="#e2e8f0">102,857 entries</text>
        <text x="180" y="420" text-anchor="middle" font-size="28px" fill="#F59E0B" font-weight="bold">45MB</text>
    </g>

    <!-- RVF Compression Pipeline Container -->
    <g filter="url(#shadow)">
        <rect x="320" y="150" width="550" height="400" rx="12" fill="rgba(60, 120, 240, 0.2)" stroke="#3B82F6" stroke-width="2" stroke-dasharray="8 4"/>
        <text x="595" y="175" text-anchor="middle" font-size="22px" fill="#F59E0B" font-weight="bold">RVF Compression Pipeline</text>

        <!-- Stage 1: Binary Quantization -->
        <rect x="350" y="200" width="150" height="120" rx="8" fill="url(#stageGradient)"/>
        <circle cx="425" cy="235" r="18" fill="#e2e8f0"/>
        <rect x="410" y="220" width="10" height="30" fill="#6366F1" transform="rotate(20 425 235)"/>
        <rect x="420" y="215" width="10" height="30" fill="#6366F1" transform="rotate(90 425 235)"/>
        <rect x="430" y="220" width="10" height="30" fill="#6366F1" transform="rotate(-20 425 235)"/>
        <text x="425" y="275" text-anchor="middle" font-size="16px" fill="#e2e8f0" font-weight="bold">Binary Quantization</text>
        <text x="425" y="295" text-anchor="middle" font-size="12px" fill="#d0dceb">384D to 48 bytes (1-bit)</text>

        <!-- Stage 2: Scalar Quantization -->
        <rect x="525" y="200" width="150" height="120" rx="8" fill="url(#stageGradient)"/>
        <path d="M600,220 L580,250 L620,250 Z" fill="#e2e8f0" transform="scale(0.8) translate(120, 50)"/> <!-- Funnel top -->
        <rect x="590" y="240" width="20" height="20" fill="#e2e8f0" transform="translate(0, 0)"/> <!-- Funnel body -->
        <text x="600" y="275" text-anchor="middle" font-size="16px" fill="#e2e8f0" font-weight="bold">Scalar Quantization</text>
        <text x="600" y="295" text-anchor="middle" font-size="12px" fill="#d0dceb">float32 to uint8 (4x Comp.)</text>
        <text x="600" y="310" text-anchor="middle" font-size="12px" fill="#d0dceb">0.9999 Cosine Sim.</text>


        <!-- Stage 3: Gzip Compression -->
        <rect x="700" y="200" width="150" height="120" rx="8" fill="url(#stageGradient)"/>
        <polygon points="760,220 750,240 765,240 755,260 770,260 760,280 775,280 765,300 780,300 770,320" fill="#e2e8f0" transform="scale(0.6) translate(295, 100)"/> <!-- Lightning bolt -->
        <text x="775" y="275" text-anchor="middle" font-size="16px" fill="#e2e8f0" font-weight="bold">Gzip Compression</text>
        <text x="775" y="295" text-anchor="middle" font-size="12px" fill="#d0dceb">Final lossless pass</text>
    </g>

    <!-- Output Block -->
    <g filter="url(#shadow)">
        <rect x="920" y="180" width="180" height="280" rx="12" fill="url(#outputGradient)" />
        <path d="M1010,240 A40,20 0 1 1 1010,200 A40,20 0 1 1 1010,240 Z M970,220 L970,300 Q970,320 1010,320 Q1050,320 1050,300 L1050,220 Z M1010,320 A40,20 0 1 1 1010,280 A40,20 0 1 1 1010,320 Z" fill="#e2e8f0" transform="scale(0.6) translate(390, 70)" />
        <text x="1010" y="340" text-anchor="middle" font-size="20px" fill="#e2e8f0" font-weight="bold">Curated Gold</text>
        <text x="1010" y="365" text-anchor="middle" font-size="14px" fill="#e2e8f0">377 entries</text>
        <text x="1010" y="420" text-anchor="middle" font-size="28px" fill="#F59E0B" font-weight="bold">0.5MB</text>
    </g>

    <!-- Hero Metric -->
    <g>
        <path d="M880,280 L900,280 L900,270 L910,285 L900,300 L900,290 L880,290 Z" fill="#e2e8f0" marker-end="url(#arrowhead)"/>
        <text x="895" y="350" text-anchor="middle" font-size="48px" fill="#F97316" font-weight="bold">85x</text>
        <text x="895" y="390" text-anchor="middle" font-size="24px" fill="#F97316" font-weight="bold">Smaller</text>
    </g>

    <!-- Ask-RuvNet MCP Server -->
    <g filter="url(#shadow)">
        <rect x="700" y="600" width="300" height="100" rx="12" fill="url(#serverGradient)"/>
        <rect x="710" y="610" width="280" height="15" rx="4" fill="#52525B"/>
        <rect x="710" y="630" width="280" height="15" rx="4" fill="#52525B"/>
        <rect x="710" y="650" width="280" height="15" rx="4" fill="#52525B"/>
        <text x="850" y="685" text-anchor="middle" font-size="20px" fill="#e2e8f0" font-weight="bold">Ask-RuvNet MCP</text>
    </g>

    <!-- Brain Icon for Self-Explanation -->
    <g filter="url(#shadow)">
        <circle cx="1060" cy="650" r="40" fill="#6366F1" opacity="0.8"/>
        <path d="M1060,615 A25,25 0 0 1 1080,630 A20,20 0 0 1 1085,650 A25,25 0 0 1 1060,685 A25,25 0 0 1 1035,650 A20,20 0 0 1 1040,630 A25,25 0 0 1 1060,615 Z" fill="#e2e8f0" opacity="0.9"/>
        <path d="M1060,620 A15,15 0 0 0 1070,630 A10,10 0 0 0 1075,645 A15,15 0 0 0 1060,670 A15,15 0 0 0 1045,645 A10,10 0 0 0 1050,630 A15,15 0 0 0 1060,620 Z" fill="#6366F1"/>
        <text x="1060" y="715" text-anchor="middle" font-size="16px" fill="#e2e8f0" font-weight="bold">Self-Explanation</text>
    </g>

    <!-- Arrows -->
    <line x1="280" y1="320" x2="350" y2="260" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="315" y="290" text-anchor="middle" font-size="14px" fill="#e2e8f0">Raw Data</text>

    <line x1="500" y1="260" x2="525" y2="260" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="512" y="250" text-anchor="middle" font-size="14px" fill="#e2e8f0">Quantized</text>

    <line x1="675" y1="260" x2="700" y2="260" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="687" y="250" text-anchor="middle" font-size="14px" fill="#e2e8f0">Compressed</text>

    <line x1="850" y1="260" x2="920" y2="320" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="885" y="290" text-anchor="middle" font-size="14px" fill="#e2e8f0">Gold Data</text>

    <line x1="850" y1="550" x2="850" y2="600" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="850" y="580" text-anchor="middle" font-size="14px" fill="#e2e8f0">RVF Output</text>

    <line x1="990" y1="650" x2="1020" y2="650" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="1005" y="640" text-anchor="middle" font-size="14px" fill="#e2e8f0">Explain</text>

</svg>