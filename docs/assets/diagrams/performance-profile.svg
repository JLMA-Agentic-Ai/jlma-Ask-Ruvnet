<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="700" height="450">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { font-size: 14px; font-weight: 700; fill: #1a1a1a; }
    .bar-label { font-size: 10px; font-weight: 600; fill: #1a1a1a; }
    .bar-time { font-size: 9px; fill: #666666; }
    .bar-time-inside { font-size: 9px; font-weight: 600; fill: #ffffff; }
    .footer-text { font-size: 9.5px; fill: #666666; }
    .footer-title { font-size: 10px; font-weight: 700; fill: #1a1a1a; }
    .section-label { font-size: 9px; font-weight: 700; fill: #4a90d9; text-transform: uppercase; letter-spacing: 0.5px; }
    .axis-line { stroke: #cccccc; stroke-width: 0.8; }
    .grid-line { stroke: #e8e8e8; stroke-width: 0.5; stroke-dasharray: 3,3; }
    .divider { stroke: #cccccc; stroke-width: 1; stroke-dasharray: 6,3; }
    .highlight-box { fill: #4a90d9; opacity: 0.08; stroke: #4a90d9; stroke-width: 0.8; stroke-dasharray: 4,2; rx: 4; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #e6edf3; }
      .bar-label { fill: #e6edf3; }
      .bar-time { fill: #8b949e; }
      .footer-text { fill: #8b949e; }
      .footer-title { fill: #e6edf3; }
      .section-label { fill: #58a6ff; }
      .axis-line { stroke: #444c56; }
      .grid-line { stroke: #373e47; }
      .divider { stroke: #444c56; }
      .highlight-box { fill: #58a6ff; opacity: 0.06; stroke: #58a6ff; }
    }
  </style>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" class="title">Request Latency Breakdown</text>

  <!-- Scale reference at top -->
  <text x="200" y="42" text-anchor="middle" class="bar-time" style="font-size: 8px;">0ms</text>
  <text x="310" y="42" text-anchor="middle" class="bar-time" style="font-size: 8px;">50ms</text>
  <text x="420" y="42" text-anchor="middle" class="bar-time" style="font-size: 8px;">100ms</text>
  <text x="530" y="42" text-anchor="middle" class="bar-time" style="font-size: 8px;">500ms</text>
  <text x="640" y="42" text-anchor="middle" class="bar-time" style="font-size: 8px;">5s</text>
  <line x1="200" y1="46" x2="660" y2="46" class="axis-line" />

  <!-- Grid lines -->
  <line x1="200" y1="46" x2="200" y2="340" class="grid-line" />
  <line x1="310" y1="46" x2="310" y2="340" class="grid-line" />
  <line x1="420" y1="46" x2="420" y2="340" class="grid-line" />
  <line x1="530" y1="46" x2="530" y2="340" class="grid-line" />

  <!-- Section: RAG Pipeline -->
  <text x="30" y="62" class="section-label">RAG Pipeline</text>

  <!-- Bar: Input Sanitize <1ms -->
  <text x="190" y="82" text-anchor="end" class="bar-label">Input Sanitize</text>
  <rect x="200" y="70" width="4" height="18" rx="2" fill="#38a169" />
  <text x="212" y="83" class="bar-time">&lt;1ms</text>

  <!-- Bar: Query Embedding 10-30ms -->
  <text x="190" y="108" text-anchor="end" class="bar-label">Query Embedding</text>
  <rect x="200" y="96" width="66" height="18" rx="2" fill="#4a90d9" />
  <text x="274" y="109" class="bar-time">10-30ms ONNX</text>

  <!-- Bar: HNSW Search 2-5ms -->
  <text x="190" y="134" text-anchor="end" class="bar-label">HNSW Search</text>
  <rect x="200" y="122" width="11" height="18" rx="2" fill="#38a169" />
  <text x="219" y="135" class="bar-time">2-5ms</text>

  <!-- Bar: BM25 Hybrid 5-10ms -->
  <text x="190" y="160" text-anchor="end" class="bar-label">BM25 Hybrid</text>
  <rect x="200" y="148" width="22" height="18" rx="2" fill="#4a90d9" />
  <text x="230" y="161" class="bar-time">5-10ms</text>

  <!-- Bar: Multi-Hop 5-15ms -->
  <text x="190" y="186" text-anchor="end" class="bar-label">Multi-Hop</text>
  <rect x="200" y="174" width="33" height="18" rx="2" fill="#805ad5" />
  <text x="241" y="187" class="bar-time">5-15ms</text>

  <!-- Bar: Re-Ranking 5-10ms -->
  <text x="190" y="212" text-anchor="end" class="bar-label">Re-Ranking</text>
  <rect x="200" y="200" width="22" height="18" rx="2" fill="#4a90d9" />
  <text x="230" y="213" class="bar-time">5-10ms</text>

  <!-- Bar: Compression 10-20ms -->
  <text x="190" y="238" text-anchor="end" class="bar-label">Compression</text>
  <rect x="200" y="226" width="44" height="18" rx="2" fill="#805ad5" />
  <text x="252" y="239" class="bar-time">10-20ms</text>

  <!-- Separator line -->
  <line x1="30" y1="256" x2="660" y2="256" class="divider" />
  <text x="30" y="272" class="section-label">Totals</text>

  <!-- Bar: Total RAG ~40-90ms - highlighted -->
  <rect x="18" y="276" width="654" height="30" class="highlight-box" />
  <text x="190" y="296" text-anchor="end" class="bar-label" style="font-weight: 700;">Total RAG</text>
  <rect x="200" y="282" width="198" height="20" rx="3" fill="#4a90d9" />
  <text x="296" y="296" text-anchor="middle" class="bar-time-inside">~40-90ms</text>

  <!-- Bar: LLM Generation 1-5s - large, different color -->
  <text x="190" y="324" text-anchor="end" class="bar-label" style="font-weight: 700;">LLM Generation</text>
  <rect x="200" y="310" width="440" height="20" rx="3" fill="#e53e3e" />
  <text x="420" y="324" text-anchor="middle" class="bar-time-inside">1-5 seconds (SSE streaming)</text>

  <!-- Bar: Browser Render 200-500ms -->
  <text x="190" y="350" text-anchor="end" class="bar-label">Browser Render</text>
  <rect x="200" y="338" width="132" height="18" rx="2" fill="#d69e2e" />
  <text x="264" y="351" text-anchor="middle" class="bar-time-inside">200-500ms</text>

  <!-- Footer separator -->
  <line x1="30" y1="370" x2="660" y2="370" class="divider" />

  <!-- Memory footer -->
  <text x="40" y="392" class="footer-title">Memory Footprint</text>

  <rect x="176" y="380" width="12" height="12" rx="2" fill="#4a90d9" />
  <text x="194" y="392" class="footer-text">Server ~250MB</text>

  <rect x="300" y="380" width="12" height="12" rx="2" fill="#38a169" />
  <text x="318" y="392" class="footer-text">Browser ~80MB</text>

  <rect x="418" y="380" width="12" height="12" rx="2" fill="#805ad5" />
  <text x="436" y="392" class="footer-text">KB ~2MB total</text>

  <!-- Insight -->
  <text x="350" y="418" text-anchor="middle" class="footer-text" style="font-style: italic;">
    RAG adds &lt;100ms overhead. LLM generation dominates at 95%+ of total latency.
  </text>

  <!-- Percentages on right -->
  <text x="656" y="296" text-anchor="end" class="bar-time" style="font-weight: 600; fill: #4a90d9;">~2%</text>
  <text x="656" y="324" text-anchor="end" class="bar-time" style="font-weight: 600; fill: #e53e3e;">~95%</text>
  <text x="656" y="351" text-anchor="end" class="bar-time" style="font-weight: 600; fill: #d69e2e;">~3%</text>
</svg>