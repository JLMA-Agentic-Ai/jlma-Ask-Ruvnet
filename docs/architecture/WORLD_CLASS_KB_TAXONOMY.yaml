# =============================================================================
# QUALITY SCORING RUBRIC
# =============================================================================

quality_scoring:
  description: "Quality assessment criteria for knowledge base entries"

  dimensions:
    accuracy:
      weight: 25
      description: "Factual correctness and technical accuracy"
      criteria:
        100: "Verified against source code, tested, no errors"
        80: "Accurate based on documentation, minor clarifications needed"
        60: "Generally accurate but some outdated information"
        40: "Contains inaccuracies that need correction"
        20: "Significantly inaccurate or misleading"

    completeness:
      weight: 25
      description: "Coverage of the topic"
      criteria:
        100: "Comprehensive coverage with all aspects documented"
        80: "Good coverage, missing minor edge cases"
        60: "Covers main points, some gaps in detail"
        40: "Partial coverage, significant missing sections"
        20: "Incomplete, only scratches the surface"

    clarity:
      weight: 20
      description: "Readability and understandability"
      criteria:
        100: "Crystal clear, well-structured, excellent examples"
        80: "Clear and readable with good organization"
        60: "Understandable but could be better organized"
        40: "Confusing in places, needs restructuring"
        20: "Difficult to understand, poorly written"

    code_quality:
      weight: 15
      description: "Quality of code examples (if present)"
      criteria:
        100: "Production-ready, tested, follows best practices"
        80: "Good examples that work as documented"
        60: "Examples work but lack error handling"
        40: "Examples have issues or are incomplete"
        20: "Broken or misleading code examples"

    currency:
      weight: 15
      description: "How up-to-date the content is"
      criteria:
        100: "Current with latest version, recently verified"
        80: "Up-to-date within last 3 months"
        60: "Up-to-date within last 6 months"
        40: "6-12 months old, may have outdated info"
        20: "Over 1 year old, likely outdated"

  tiers:
    canonical:
      min_score: 100
      description: "Authoritative, verified, primary source of truth"
      badge: "gold"
    high:
      min_score: 80
      description: "Well-documented, tested, reliable"
      badge: "silver"
    medium:
      min_score: 60
      description: "Useful but may need updates"
      badge: "bronze"
    low:
      min_score: 40
      description: "Incomplete or outdated"
      badge: "none"
    draft:
      min_score: 0
      description: "Work in progress"
      badge: "wip"
    deprecated:
      description: "Superseded, kept for history"
      badge: "deprecated"

# =============================================================================
# DEDUPLICATION STRATEGY
# =============================================================================

deduplication:
  description: "Strategy for identifying and handling duplicate content"

  methods:
    content_hash:
      description: "SHA-256 hash of normalized content"
      normalization:
        - lowercase
        - remove_extra_whitespace
        - trim
        - remove_markdown_formatting
      threshold: "exact_match"
      action: "mark_as_duplicate"

    semantic_similarity:
      description: "Embedding-based similarity detection"
      model: "all-MiniLM-L6-v2"
      dimensions: 384
      threshold: 0.95
      action: "flag_for_review"

    title_similarity:
      description: "Fuzzy matching on titles"
      algorithm: "levenshtein"
      threshold: 0.85
      action: "flag_for_review"

  canonical_selection:
    description: "How to choose the canonical version"
    criteria:
      - highest_quality_score
      - most_recent_update
      - from_authoritative_source
      - has_code_examples
      - longest_content

  handling:
    exact_duplicates:
      action: "keep_canonical_only"
      preserve_references: true
    near_duplicates:
      action: "merge_content"
      manual_review: true
    superseded_content:
      action: "mark_deprecated"
      preserve: true

# =============================================================================
# TOPIC HIERARCHY STRUCTURE
# =============================================================================

topic_hierarchy:
  description: "Hierarchical organization of knowledge topics"

  structure:
    depth: 4
    levels:
      1: "Domain (Category)"
      2: "Subdomain (Subcategory)"
      3: "Topic"
      4: "Subtopic"

  relationships:
    parent_child:
      description: "Hierarchical containment"
      example: "agents > core-agents > coder"
    related:
      description: "Non-hierarchical association"
      example: "coder <-> reviewer (collaboration)"
    prerequisite:
      description: "Learning dependency"
      example: "hnsw-indexing requires embedding-generation"
    supersedes:
      description: "Version replacement"
      example: "v2-api supersedes v1-api"

  navigation:
    breadcrumbs: true
    tree_view: true
    graph_view: true
    search_aliases: true

# =============================================================================
# DOCUMENT TYPES
# =============================================================================

document_types:
  api_reference:
    description: "API documentation, function signatures, parameters"
    required_fields:
      - function_signature
      - parameters
      - return_type
      - examples
    quality_weight: 1.2

  tutorial:
    description: "Step-by-step guides with working examples"
    required_fields:
