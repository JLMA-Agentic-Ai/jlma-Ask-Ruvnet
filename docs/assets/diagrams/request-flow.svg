<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #333333; stroke-width: 1.5; rx: 6; }
      .box-branch { fill: #f8f9fa; stroke: #4a90d9; stroke-width: 1.5; rx: 6; }
      .label { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .desc { font-family: system-ui, sans-serif; font-size: 10px; fill: #666666; }
      .pct { font-family: system-ui, sans-serif; font-size: 10px; font-weight: 700; fill: #4a90d9; }
      .arrow { stroke: #555555; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
      .arrow-branch { stroke: #4a90d9; stroke-width: 1.5; fill: none; marker-end: url(#ah-blue); }
      .arrow-merge { stroke: #4a90d9; stroke-width: 1.5; fill: none; marker-end: url(#ah-blue); }
      @media (prefers-color-scheme: dark) {
        .box { fill: #2d333b; stroke: #768390; }
        .box-branch { fill: #2d333b; stroke: #6cb6ff; }
        .label { fill: #e6edf3; }
        .desc { fill: #8b949e; }
        .pct { fill: #6cb6ff; }
        .arrow { stroke: #768390; }
        .arrow-branch, .arrow-merge { stroke: #6cb6ff; }
      }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555555" />
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90d9" />
    </marker>
  </defs>

  <!-- Step 1: User Query -->
  <rect class="box" x="160" y="20" width="180" height="36" />
  <text class="label" x="250" y="43" text-anchor="middle">User Query</text>
  <text class="desc" x="400" y="43">Chat message input</text>

  <line class="arrow" x1="250" y1="56" x2="250" y2="76" />

  <!-- Step 2: Input Sanitize -->
  <rect class="box" x="160" y="76" width="180" height="36" />
  <text class="label" x="250" y="99" text-anchor="middle">Input Sanitize</text>
  <text class="desc" x="400" y="99">Strip injection, normalize</text>

  <line class="arrow" x1="250" y1="112" x2="250" y2="132" />

  <!-- Step 3: Query Expand -->
  <rect class="box" x="160" y="132" width="180" height="36" />
  <text class="label" x="250" y="155" text-anchor="middle">Query Expand</text>
  <text class="desc" x="400" y="155">Synonyms, intent extraction</text>

  <line class="arrow" x1="250" y1="168" x2="250" y2="188" />

  <!-- Step 4: Hybrid Search -->
  <rect class="box" x="160" y="188" width="180" height="36" />
  <text class="label" x="250" y="211" text-anchor="middle">Hybrid Search</text>
  <text class="desc" x="400" y="211">Parallel retrieval</text>

  <!-- Branch lines -->
  <line class="arrow-branch" x1="205" y1="224" x2="130" y2="254" />
  <line class="arrow-branch" x1="295" y1="224" x2="370" y2="254" />

  <!-- BM25 branch -->
  <rect class="box-branch" x="60" y="254" width="140" height="36" />
  <text class="label" x="130" y="277" text-anchor="middle">BM25</text>
  <text class="pct" x="130" y="300" text-anchor="middle">45% weight</text>

  <!-- HNSW branch -->
  <rect class="box-branch" x="300" y="254" width="140" height="36" />
  <text class="label" x="370" y="277" text-anchor="middle">HNSW</text>
  <text class="pct" x="370" y="300" text-anchor="middle">55% weight</text>

  <!-- Merge lines -->
  <line class="arrow-merge" x1="130" y1="290" x2="205" y2="320" />
  <line class="arrow-merge" x1="370" y1="290" x2="295" y2="320" />

  <!-- Step 5: Multi-Hop -->
  <rect class="box" x="160" y="320" width="180" height="36" />
  <text class="label" x="250" y="343" text-anchor="middle">Multi-Hop</text>
  <text class="desc" x="400" y="343">Follow related entries</text>

  <line class="arrow" x1="250" y1="356" x2="250" y2="376" />

  <!-- Step 6: Re-Rank -->
  <rect class="box" x="160" y="376" width="180" height="36" />
  <text class="label" x="250" y="399" text-anchor="middle">Re-Rank</text>
  <text class="desc" x="400" y="399">Score fusion, relevance sort</text>

  <line class="arrow" x1="250" y1="412" x2="250" y2="432" />

  <!-- Step 7: Compress -->
  <rect class="box" x="160" y="432" width="180" height="36" />
  <text class="label" x="250" y="455" text-anchor="middle">Compress</text>
  <text class="desc" x="400" y="455">Trim context to token limit</text>

  <line class="arrow" x1="250" y1="468" x2="250" y2="488" />

  <!-- Step 8: LLM Generate -->
  <rect class="box" x="160" y="488" width="180" height="36" />
  <text class="label" x="250" y="511" text-anchor="middle">LLM Generate</text>
  <text class="desc" x="400" y="511">7-provider fallback chain</text>

  <line class="arrow" x1="250" y1="524" x2="250" y2="544" />

  <!-- Step 9: Validate -->
  <rect class="box" x="160" y="544" width="180" height="36" />
  <text class="label" x="250" y="567" text-anchor="middle">Validate</text>
  <text class="desc" x="400" y="567">Anti-fabrication checks</text>

  <line class="arrow" x1="250" y1="580" x2="250" y2="600" />

  <!-- Step 10: SSE Stream -->
  <rect x="160" y="600" width="180" height="36" rx="6" fill="#38a169" stroke="#38a169" stroke-width="1.5" />
  <text class="label" x="250" y="623" text-anchor="middle" fill="#ffffff">SSE Stream</text>
  <text class="desc" x="400" y="623">Token-by-token to browser</text>
</svg>