  </text>

  <!-- Ruflo (Middle) -->
  <rect x="300" y="450" width="400" height="90" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
  <!-- Gear Icon -->
  <g transform="translate(480, 470) scale(0.6)">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#E2E8F0" stroke-width="3"/>
    <g fill="#E2E8F0">
