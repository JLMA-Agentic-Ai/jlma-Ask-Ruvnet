<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340">
  <rect width="760" height="340" fill="#1a1a2e"/>
  <!-- Outer border -->
  <rect x="10" y="10" width="740" height="320" rx="6" fill="#16213e" stroke="#4a9eff" stroke-width="2"/>
  <!-- Header -->
  <rect x="10" y="10" width="740" height="42" rx="6" fill="#0f3460" stroke="#4a9eff" stroke-width="2"/>
  <text x="380" y="38" fill="#4a9eff" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">THE GOLDEN RULE</text>
  <!-- Main statement -->
  <text x="380" y="80" fill="#e2e8f0" font-family="monospace" font-size="13" text-anchor="middle">The knowledge base is NOT just storage — it's the DECISION ENGINE.</text>
  <!-- Divider -->
  <line x1="40" y1="96" x2="720" y2="96" stroke="#334155" stroke-width="1"/>
  <!-- Forbidden column header -->
  <text x="185" y="118" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Agents are NOT allowed to:</text>
  <!-- Must do column header -->
  <text x="565" y="118" fill="#4ade80" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Agents MUST:</text>
  <!-- Center divider -->
  <line x1="375" y1="100" x2="375" y2="300" stroke="#334155" stroke-width="1"/>
  <!-- Forbidden items -->
  <text x="55" y="145" fill="#ef4444" font-family="monospace" font-size="12">❌</text>
  <text x="80" y="145" fill="#94a3b8" font-family="monospace" font-size="11">Summarize KB into "key rules"</text>
  <text x="55" y="173" fill="#ef4444" font-family="monospace" font-size="12">❌</text>
  <text x="80" y="173" fill="#94a3b8" font-family="monospace" font-size="11">Use "based on my understanding"</text>
  <text x="55" y="201" fill="#ef4444" font-family="monospace" font-size="12">❌</text>
  <text x="80" y="201" fill="#94a3b8" font-family="monospace" font-size="11">Skip KB queries for "common" questions</text>
  <text x="55" y="229" fill="#ef4444" font-family="monospace" font-size="12">❌</text>
  <text x="80" y="229" fill="#94a3b8" font-family="monospace" font-size="11">Paraphrase KB without citing sources</text>
  <!-- Must do items -->
  <text x="395" y="145" fill="#4ade80" font-family="monospace" font-size="12">✅</text>
  <text x="420" y="145" fill="#94a3b8" font-family="monospace" font-size="11">Query KB for EVERY user question</text>
  <text x="395" y="173" fill="#4ade80" font-family="monospace" font-size="12">✅</text>
  <text x="420" y="173" fill="#94a3b8" font-family="monospace" font-size="11">Include raw KB content in responses</text>
  <text x="395" y="201" fill="#4ade80" font-family="monospace" font-size="12">✅</text>
  <text x="420" y="201" fill="#94a3b8" font-family="monospace" font-size="11">Cite source titles and similarity scores</text>
  <text x="395" y="229" fill="#4ade80" font-family="monospace" font-size="12">✅</text>
  <text x="420" y="229" fill="#94a3b8" font-family="monospace" font-size="11">Acknowledge knowledge gaps explicitly</text>
  <!-- Footer violation statement -->
  <line x1="40" y1="248" x2="720" y2="248" stroke="#334155" stroke-width="1"/>
  <text x="380" y="275" fill="#ef4444" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">VIOLATION OF THESE RULES IS UNACCEPTABLE.</text>
  <text x="380" y="300" fill="#64748b" font-family="monospace" font-size="11" text-anchor="middle">If you cannot cite a KB source, say "I need to query the knowledge base for this."</text>
</svg>
