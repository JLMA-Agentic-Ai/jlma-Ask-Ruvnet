services:
  - type: web
    name: ask-ruvnet
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: NODE_ENV=development npm install --include=dev && NODE_ENV=development npm run build
    startCommand: node src/server/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard - points to Neon
      - key: PORT
        value: "3000"
    healthCheckPath: /health
    autoDeploy: true
