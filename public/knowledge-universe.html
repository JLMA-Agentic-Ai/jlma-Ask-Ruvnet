    <canvas id="canvas"></canvas>

    <script>
        // Safe DOM helpers
        const safeSetText = (el, text) => { if (el) el.textContent = String(text || ''); };
        const safeCreateElement = (tag, className, text) => {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (text) el.textContent = String(text);
            return el;
        };

        // State
        let knowledgeBase = null;
        let selectedCategory = null;
        let selectedSubItem = null;
        let navigationPath = [];
        let isExpanded = true; // Start expanded to show all categories immediately
        let autoRotate = true;

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let rotationX = 0, rotationY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let isDragging = false;
        let lastX, lastY;
        let zoom = 1;
        let pulsePhase = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize);
        resize();

        // 3D projection
        function project(x, y, z) {
            const perspective = 1000;
            const cosX = Math.cos(rotationX), sinX = Math.sin(rotationX);
            const cosY = Math.cos(rotationY), sinY = Math.sin(rotationY);

            let x1 = x * cosY - z * sinY;
            let z1 = x * sinY + z * cosY;
            let y1 = y * cosX - z1 * sinX;
            let z2 = y * sinX + z1 * cosX;

            const scale = perspective / (perspective + z2) * zoom;
            return {
                x: width / 2 + x1 * scale,
                y: height / 2 + y1 * scale,
                scale: scale,
                z: z2
            };
        }

        // Calculate positions
        function calculatePositions() {
            if (!knowledgeBase || !knowledgeBase.children) return;

            const categories = knowledgeBase.children;
            const numCats = categories.length;
            const hasSelection = selectedCategory !== null;

            // Center position shifts left when category selected
            const centerX = hasSelection ? -150 : 0;
            knowledgeBase.pos = { x: 0, y: 0, z: 0 };
            knowledgeBase.targetPos = { x: centerX, y: 0, z: 0 };

            if (!hasSelection) {
                // No selection - spread evenly in circle
                const radius = 280;
                categories.forEach((cat, i) => {
                    const angle = (i / numCats) * Math.PI * 2 - Math.PI / 2;
                    cat.targetPos = {
                        x: Math.cos(angle) * radius,
                        y: Math.sin(angle) * radius * 0.6,
                        z: Math.sin(angle) * 100
                    };
                    if (!cat.pos) cat.pos = { x: 0, y: 0, z: 0 };
                });
            } else {
                // Selection active - compress unselected to left arc
                const selectedIndex = categories.indexOf(selectedCategory);
                const unselected = categories.filter(c => c !== selectedCategory);

                const compressedRadius = 180;
                const arcSpan = Math.PI * 0.8;
                const arcStart = Math.PI / 2 + (Math.PI - arcSpan) / 2;

                unselected.forEach((cat, i) => {
                    const angle = arcStart + (i / (unselected.length - 1 || 1)) * arcSpan;
                    cat.targetPos = {
                        x: centerX + Math.cos(angle) * compressedRadius - 100,
                        y: Math.sin(angle) * compressedRadius * 0.7,
                        z: -50
                    };
                    if (!cat.pos) cat.pos = { ...cat.targetPos };
                });

                // Selected category moves right with children
                selectedCategory.targetPos = {
                    x: centerX + 200,
                    y: 0,
                    z: 50
                };
                if (!selectedCategory.pos) selectedCategory.pos = { x: 0, y: 0, z: 0 };

                // Children spread vertically
                if (selectedCategory.children) {
                    const numChildren = selectedCategory.children.length;
                    const startX = selectedCategory.targetPos.x + 180;
                    const spacingY = 80;
                    const totalHeight = (numChildren - 1) * spacingY;
                    const startY = -totalHeight / 2;

                    selectedCategory.children.forEach((child, j) => {
                        child.targetPos = {
                            x: startX + (j % 2) * 60,
                            y: startY + j * spacingY,
                            z: 30 + j * 8
                        };
                        if (!child.pos) child.pos = { ...selectedCategory.targetPos };
                    });
                }
            }
        }

        // Animate positions
        function animatePositions() {
            const lerp = (a, b, t) => a + (b - a) * t;
            const lerpPos = (pos, target) => {
                if (!pos || !target) return;
                pos.x = lerp(pos.x, target.x, 0.08);
                pos.y = lerp(pos.y, target.y, 0.08);
                pos.z = lerp(pos.z, target.z, 0.08);
            };

            if (knowledgeBase) {
                lerpPos(knowledgeBase.pos, knowledgeBase.targetPos);
                knowledgeBase.children?.forEach(cat => {
                    lerpPos(cat.pos, cat.targetPos);
                    cat.children?.forEach(child => lerpPos(child.pos, child.targetPos));
                });
            }

            rotationX = lerp(rotationX, targetRotationX, 0.1);
            rotationY = lerp(rotationY, targetRotationY, 0.1);
        }

        // Draw node
        function drawNode(node, isCenter, dimmed) {
            if (!node.pos) return;

            const p = project(node.pos.x, node.pos.y, node.pos.z);
            node.screenPos = p;

            const baseSize = isCenter ? 50 : (node.count ? Math.min(40, 15 + node.count * 0.15) : 25);
            const radius = baseSize * p.scale * (1 + Math.sin(pulsePhase + (isCenter ? 0 : node.pos.x * 0.01)) * 0.05);
            node.screenPos.radius = radius;

            const alpha = dimmed ? 0.3 : 1;
            const color = node.color || '#64b5f6';

            // Glow
            const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 2.5);
            gradient.addColorStop(0, color + (dimmed ? '40' : '80'));
            gradient.addColorStop(0.5, color + (dimmed ? '20' : '40'));
            gradient.addColorStop(1, 'transparent');
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Core
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
            const coreGradient = ctx.createRadialGradient(p.x - radius * 0.3, p.y - radius * 0.3, 0, p.x, p.y, radius);
            coreGradient.addColorStop(0, lightenColor(color, 60));
            coreGradient.addColorStop(1, color);
            ctx.fillStyle = coreGradient;
            ctx.globalAlpha = alpha;
            ctx.fill();
            ctx.globalAlpha = 1;

            // Label
            ctx.font = `${Math.max(11, radius * 0.35)}px 'Segoe UI', system-ui, sans-serif`;
            ctx.fillStyle = dimmed ? 'rgba(255,255,255,0.4)' : 'white';
            ctx.textAlign = 'center';

            const label = node.name.length > 18 ? node.name.substring(0, 16) + '...' : node.name;
            ctx.fillText(label, p.x, p.y + radius + 16);

            if (node.count && !dimmed) {
                ctx.font = '10px system-ui';
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText(`(${node.count})`, p.x, p.y + radius + 28);
            }
        }

        function lightenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return `rgb(${R}, ${G}, ${B})`;
        }

        // Draw connections
        function drawConnections() {
            if (!knowledgeBase || !isExpanded) return;

            const centerP = project(knowledgeBase.pos.x, knowledgeBase.pos.y, knowledgeBase.pos.z);

            knowledgeBase.children?.forEach(cat => {
                if (!cat.pos) return;
                const catP = project(cat.pos.x, cat.pos.y, cat.pos.z);

                ctx.beginPath();
                ctx.moveTo(centerP.x, centerP.y);
                ctx.lineTo(catP.x, catP.y);
                ctx.strokeStyle = selectedCategory === cat ? `${cat.color}60` : `${cat.color}20`;
                ctx.lineWidth = selectedCategory === cat ? 2 : 1;
                ctx.stroke();

                if (selectedCategory === cat && cat.children) {
                    cat.children.forEach(child => {
                        if (!child.pos) return;
                        const childP = project(child.pos.x, child.pos.y, child.pos.z);
                        ctx.beginPath();
                        ctx.moveTo(catP.x, catP.y);
                        ctx.lineTo(childP.x, childP.y);
                        ctx.strokeStyle = `${cat.color}40`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    });
                }
            });
        }

        // Main render
        function render() {
            ctx.clearRect(0, 0, width, height);

            animatePositions();
            pulsePhase += 0.03;

            if (autoRotate && !isDragging && !selectedCategory) {
                targetRotationY += 0.002;
            }

            drawConnections();

            // Collect and sort nodes by Z
            const allNodes = [];
            if (knowledgeBase) {
                allNodes.push({ node: knowledgeBase, isCenter: true, dimmed: false });

                if (isExpanded) {
                    knowledgeBase.children?.forEach(cat => {
                        const dimmed = selectedCategory && selectedCategory !== cat;
                        allNodes.push({ node: cat, isCenter: false, dimmed });

                        if (selectedCategory === cat && cat.children) {
                            cat.children.forEach(child => {
                                allNodes.push({ node: child, isCenter: false, dimmed: false });
                            });
                        }
                    });
                }
            }

            allNodes.sort((a, b) => (b.node.pos?.z || 0) - (a.node.pos?.z || 0));
            allNodes.forEach(({ node, isCenter, dimmed }) => drawNode(node, isCenter, dimmed));

            requestAnimationFrame(render);
        }

        // Click handling
        canvas.addEventListener('click', (e) => {
            const x = e.clientX, y = e.clientY;

            // Center node click
            if (knowledgeBase?.screenPos) {
                const dx = x - knowledgeBase.screenPos.x;
                const dy = y - knowledgeBase.screenPos.y;
                if (Math.sqrt(dx * dx + dy * dy) < knowledgeBase.screenPos.radius + 10) {
                    if (!isExpanded) {
                        isExpanded = true;
                        calculatePositions();
                    } else {
                        goHome();
                    }
                    return;
                }
            }

            // Category nodes
            if (isExpanded && knowledgeBase?.children) {
                for (const cat of knowledgeBase.children) {
                    if (!cat.screenPos) continue;
                    const dx = x - cat.screenPos.x;
                    const dy = y - cat.screenPos.y;
                    if (Math.sqrt(dx * dx + dy * dy) < cat.screenPos.radius + 10) {
                        selectCategory(cat);
                        return;
                    }
                }
            }

            // Child nodes
            if (selectedCategory?.children) {
                for (const child of selectedCategory.children) {
                    if (!child.screenPos) continue;
                    const dx = x - child.screenPos.x;
                    const dy = y - child.screenPos.y;
                    if (Math.sqrt(dx * dx + dy * dy) < child.screenPos.radius + 10) {
                        selectSubItem(child);
                        return;
                    }
                }
            }
        });

        // Drag rotation
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            autoRotate = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            targetRotationY += (e.clientX - lastX) * 0.005;
            targetRotationX += (e.clientY - lastY) * 0.005;
            targetRotationX = Math.max(-0.5, Math.min(0.5, targetRotationX));
            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        // Scroll zoom
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoom = Math.max(0.5, Math.min(2, zoom - e.deltaY * 0.001));
        });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                targetRotationX = 0;
                targetRotationY = 0;
                zoom = 1;
                autoRotate = true;
            }
        });

        // Navigation functions
        function selectCategory(cat) {
            selectedCategory = cat;
            selectedSubItem = null;
            navigationPath = [knowledgeBase, cat];
            calculatePositions();
            updateInfoPanel(cat);
            updateBreadcrumb();
            updateCategoryHighlight();
        }

        function selectSubItem(item) {
            selectedSubItem = item;
            navigationPath = [knowledgeBase, selectedCategory, item];
            updateInfoPanel(item);
            updateBreadcrumb();
        }

        function goBack() {
            if (navigationPath.length > 2) {
                navigationPath.pop();
                selectedSubItem = null;
                updateInfoPanel(selectedCategory);
            } else if (navigationPath.length > 1) {
                goHome();
            }
            updateBreadcrumb();
        }

        function goHome() {
            navigationPath = [knowledgeBase];
            selectedCategory = null;
            selectedSubItem = null;
            calculatePositions();
            updateInfoPanel(knowledgeBase);
            updateBreadcrumb();
            updateCategoryHighlight();
        }

        function goToPathIndex(index) {
            while (navigationPath.length > index + 1) navigationPath.pop();
            if (index === 0) {
                goHome();
            } else if (index === 1) {
                selectedSubItem = null;
                updateInfoPanel(selectedCategory);
            }
            updateBreadcrumb();
        }

        function updateCategoryHighlight() {
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.toggle('active', item.dataset.id === selectedCategory?.id);
            });
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            bc.replaceChildren();
            navigationPath.forEach((n, i) => {
                const span = safeCreateElement('span', i === navigationPath.length - 1 ? 'breadcrumb-item current' : 'breadcrumb-item', n.name);
                if (i < navigationPath.length - 1) {
                    span.onclick = () => goToPathIndex(i);
                }
                bc.appendChild(span);
                if (i < navigationPath.length - 1) {
                    bc.appendChild(safeCreateElement('span', 'breadcrumb-sep', '›'));
                }
            });
        }

        // Info panel update
        function updateInfoPanel(node) {
            const back = document.getElementById('back-container');
            back.replaceChildren();
            if (navigationPath.length > 1) {
                const btn = safeCreateElement('div', 'back-btn', '← Back');
                btn.onclick = goBack;
                back.appendChild(btn);
            }

            safeSetText(document.getElementById('info-title'), node.name);
            safeSetText(document.getElementById('info-desc'), node.description || 'Knowledge category');

            const badge = document.getElementById('info-badge');
            badge.style.background = `linear-gradient(135deg, ${node.color || '#64b5f6'}, ${node.color || '#3b82f6'})`;
            safeSetText(badge, node.count ? `${node.count} items` : 'Knowledge Base');

            // Score dashboard visibility
            const scoreDash = document.getElementById('score-dashboard');
            if (node.id === 'root' && knowledgeBase.score) {
                scoreDash.classList.remove('hidden');
            } else {
                scoreDash.classList.add('hidden');
            }

            // Data list
            const dataSection = document.getElementById('data-section');
            const dataList = document.getElementById('data-list');
            const sectionTitle = document.getElementById('data-section-title');
            dataList.replaceChildren();

            if (node.id === 'root') {
                safeSetText(sectionTitle, 'Categories Overview');
                node.children?.forEach(cat => {
                    const item = safeCreateElement('div', 'data-item');
                    item.onclick = () => selectCategory(cat);
                    const header = safeCreateElement('div', 'data-item-header');
                    const name = safeCreateElement('span', 'data-item-name');
                    const icon = safeCreateElement('span', 'data-item-icon');
                    icon.style.background = cat.color;
                    icon.style.color = cat.color;
                    name.appendChild(icon);
                    name.appendChild(document.createTextNode(cat.name));
                    header.appendChild(name);
                    const meta = safeCreateElement('span', 'data-item-meta', `${cat.count || 0} items`);
                    header.appendChild(meta);
                    item.appendChild(header);
                    dataList.appendChild(item);
                });
            } else if (node.children && node.children.length > 0) {
                safeSetText(sectionTitle, `${node.children.length} Sub-items`);
                node.children.forEach(child => {
                    const item = safeCreateElement('div', 'data-item');
                    item.onclick = () => selectSubItem(child);
                    const header = safeCreateElement('div', 'data-item-header');
                    const name = safeCreateElement('span', 'data-item-name');
                    const icon = safeCreateElement('span', 'data-item-icon');
                    icon.style.background = child.color || node.color;
                    icon.style.color = child.color || node.color;
                    name.appendChild(icon);
                    name.appendChild(document.createTextNode(child.name));
                    header.appendChild(name);
                    item.appendChild(header);
                    if (child.description) {
                        const content = safeCreateElement('div', 'data-item-content', child.description);
                        item.appendChild(content);
                    }
                    dataList.appendChild(item);
                });
            } else {
                safeSetText(sectionTitle, 'Details');
                if (node.description) {
                    const desc = safeCreateElement('div', 'data-item');
                    safeSetText(desc, node.description);
                    dataList.appendChild(desc);
                }
                if (node.source) {
                    const src = safeCreateElement('div', 'data-item');
                    safeSetText(src, `Source: ${node.source}`);
                    dataList.appendChild(src);
                }
            }
        }

        // Build category list
        function buildCategoryList() {
            const list = document.getElementById('category-list');
            list.replaceChildren();
            knowledgeBase.children?.forEach(cat => {
                const item = safeCreateElement('div', 'category-item');
                item.dataset.id = cat.id;
                item.onclick = () => { isExpanded = true; selectCategory(cat); };

                const color = safeCreateElement('div', 'category-color');
                color.style.background = cat.color;
                color.style.color = cat.color;
                item.appendChild(color);

                const name = safeCreateElement('span', 'category-name', cat.name);
                item.appendChild(name);

                const count = safeCreateElement('span', 'category-count', cat.count || 0);
                item.appendChild(count);

                list.appendChild(item);
            });
            safeSetText(document.getElementById('category-count'), knowledgeBase.children?.length || 0);
        }

        // Score dashboard
        function getScoreClass(score) {
            if (score >= 90) return 'excellent';
            if (score >= 70) return 'good';
            if (score >= 50) return 'fair';
            return 'poor';
        }

        function populateScore(score) {
            if (!score) return;

            const overallEl = document.getElementById('score-overall');
            safeSetText(overallEl, score.overall);
            overallEl.className = `score-overall score-${getScoreClass(score.overall)}`;

            const gradeEl = document.getElementById('grade-letter');
            safeSetText(gradeEl, score.grade);
            gradeEl.className = `grade-letter score-${getScoreClass(score.overall)}`;

            const dims = document.getElementById('score-dimensions');
            dims.replaceChildren();
            const labels = { coverage: 'Coverage', depth: 'Depth', balance: 'Balance', quality: 'Quality', sources: 'Sources' };
            for (const [key, label] of Object.entries(labels)) {
                const val = score.dimensions?.[key] || 0;
                const row = safeCreateElement('div', 'dimension-row');
                row.appendChild(safeCreateElement('span', 'dimension-label', label));
                const barContainer = safeCreateElement('div', 'dimension-bar-container');
                const bar = safeCreateElement('div', `dimension-bar bar-${getScoreClass(val)}`);
                bar.style.width = '0%';
                barContainer.appendChild(bar);
                row.appendChild(barContainer);
                row.appendChild(safeCreateElement('span', `dimension-value score-${getScoreClass(val)}`, val));
                dims.appendChild(row);
                setTimeout(() => { bar.style.width = `${val}%`; }, 100);
            }

            const recList = document.getElementById('recommendations-list');
            recList.replaceChildren();
            score.recommendations?.forEach(rec => {
                const item = safeCreateElement('div', 'rec-item');
                const priority = safeCreateElement('div', `rec-priority ${rec.priority}`);
                item.appendChild(priority);
                const text = safeCreateElement('div', 'rec-text', rec.action);
                item.appendChild(text);
                recList.appendChild(item);
            });

            document.getElementById('enhance-btn').onclick = () => {
                const plan = score.recommendations?.map(r => `[${r.priority.toUpperCase()}] ${r.action}`).join('\n') || 'No recommendations';
                navigator.clipboard.writeText(`KB Enhancement Plan:\n\n${plan}\n\nRun: npm run kb:ingest after adding content.`);
                alert('Enhancement plan copied to clipboard!');
            };
        }

        // Initialize
        async function init() {
            try {
                const response = window.EMBEDDED_KB_DATA
                    ? { ok: true, json: () => Promise.resolve(window.EMBEDDED_KB_DATA) }
                    : await fetch('kb-universe-data.json');
                if (!response.ok) throw new Error('Data file not found');

                knowledgeBase = await response.json();
                navigationPath = [knowledgeBase];

                // UI updates
                safeSetText(document.getElementById('title'), knowledgeBase.name + ' Knowledge Universe');
                safeSetText(document.getElementById('subtitle'), `Click to explore ${knowledgeBase.metadata?.categories || 0} categories | ${knowledgeBase.metadata?.totalItems || 0} items`);

                buildCategoryList();
                updateInfoPanel(knowledgeBase);
                updateBreadcrumb();
                if (knowledgeBase.score) populateScore(knowledgeBase.score);
                calculatePositions();

                // Show UI
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('title-bar').classList.remove('hidden');
                document.getElementById('categories-panel').classList.remove('hidden');
                document.getElementById('info-panel').classList.remove('hidden');
                document.getElementById('breadcrumb').classList.remove('hidden');
                document.getElementById('controls').classList.remove('hidden');

                render();

            } catch (err) {
                safeSetText(document.querySelector('#loading div:last-child'), `Error: ${err.message}`);
                document.querySelector('.loading-spinner').style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
