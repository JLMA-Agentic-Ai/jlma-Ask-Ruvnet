<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 620" width="740" height="620">
  <defs>
    <marker id="st-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
  </defs>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #e0e0e0; }
    .title { font-size: 18px; font-weight: 700; }
    .topo-title { font-size: 13px; font-weight: 700; }
    .topo-sub { font-size: 10px; fill: #999; font-style: italic; }
    .node { font-size: 12px; font-weight: 600; }
    .label { font-size: 10px; fill: #888; }
  </style>
  <rect width="740" height="620" rx="12" fill="#1a1a2e"/>
  <text x="370" y="35" text-anchor="middle" class="title">Swarm Topologies</text>

  <!-- HIERARCHICAL (top-left) -->
  <rect x="20" y="55" width="340" height="200" rx="8" fill="#16213e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="190" y="78" text-anchor="middle" class="topo-title" fill="#7c3aed">HIERARCHICAL</text>
  <text x="190" y="93" text-anchor="middle" class="topo-sub">(Queen controls workers)</text>
  <!-- Queen -->
  <rect x="160" y="108" width="60" height="30" rx="6" fill="#0f3460" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="190" y="128" text-anchor="middle" class="node" fill="#7c3aed">Q</text>
  <!-- Workers -->
  <rect x="80" y="175" width="60" height="30" rx="6" fill="#0f3460" stroke="#555" stroke-width="1"/>
  <text x="110" y="195" text-anchor="middle" class="node">W1</text>
  <rect x="160" y="175" width="60" height="30" rx="6" fill="#0f3460" stroke="#555" stroke-width="1"/>
  <text x="190" y="195" text-anchor="middle" class="node">W2</text>
  <rect x="240" y="175" width="60" height="30" rx="6" fill="#0f3460" stroke="#555" stroke-width="1"/>
  <text x="270" y="195" text-anchor="middle" class="node">W3</text>
  <!-- Lines -->
  <line x1="190" y1="138" x2="110" y2="175" stroke="#555" stroke-width="1.5"/>
  <line x1="190" y1="138" x2="190" y2="175" stroke="#555" stroke-width="1.5"/>
  <line x1="190" y1="138" x2="270" y2="175" stroke="#555" stroke-width="1.5"/>

  <!-- MESH (top-right) -->
  <rect x="380" y="55" width="340" height="200" rx="8" fill="#16213e" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="550" y="78" text-anchor="middle" class="topo-title" fill="#00d4ff">MESH</text>
  <text x="550" y="93" text-anchor="middle" class="topo-sub">(Fully connected peers)</text>
  <!-- Nodes A, B, C, D -->
  <rect x="490" y="108" width="50" height="30" rx="6" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="515" y="128" text-anchor="middle" class="node" fill="#00d4ff">A</text>
  <rect x="580" y="108" width="50" height="30" rx="6" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="605" y="128" text-anchor="middle" class="node" fill="#00d4ff">B</text>
  <rect x="490" y="185" width="50" height="30" rx="6" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="515" y="205" text-anchor="middle" class="node" fill="#00d4ff">C</text>
  <rect x="580" y="185" width="50" height="30" rx="6" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="605" y="205" text-anchor="middle" class="node" fill="#00d4ff">D</text>
  <!-- All connections -->
  <line x1="540" y1="123" x2="580" y2="123" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="515" y1="138" x2="515" y2="185" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="605" y1="138" x2="605" y2="185" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="540" y1="200" x2="580" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="535" y1="135" x2="585" y2="188" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="585" y1="135" x2="535" y2="188" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>

  <!-- RING (bottom-left) -->
  <rect x="20" y="275" width="340" height="200" rx="8" fill="#16213e" stroke="#10b981" stroke-width="1.5"/>
  <text x="190" y="298" text-anchor="middle" class="topo-title" fill="#10b981">RING</text>
  <text x="190" y="313" text-anchor="middle" class="topo-sub">(Circular message passing)</text>
  <!-- Nodes -->
  <rect x="120" y="325" width="50" height="30" rx="6" fill="#0f3460" stroke="#10b981" stroke-width="1"/>
  <text x="145" y="345" text-anchor="middle" class="node" fill="#10b981">A</text>
  <rect x="220" y="325" width="50" height="30" rx="6" fill="#0f3460" stroke="#10b981" stroke-width="1"/>
  <text x="245" y="345" text-anchor="middle" class="node" fill="#10b981">B</text>
  <rect x="220" y="405" width="50" height="30" rx="6" fill="#0f3460" stroke="#10b981" stroke-width="1"/>
  <text x="245" y="425" text-anchor="middle" class="node" fill="#10b981">C</text>
  <rect x="120" y="405" width="50" height="30" rx="6" fill="#0f3460" stroke="#10b981" stroke-width="1"/>
  <text x="145" y="425" text-anchor="middle" class="node" fill="#10b981">D</text>
  <!-- Arrows -->
  <line x1="170" y1="340" x2="218" y2="340" stroke="#10b981" stroke-width="1.5" marker-end="url(#st-arrow)"/>
  <line x1="245" y1="355" x2="245" y2="403" stroke="#10b981" stroke-width="1.5" marker-end="url(#st-arrow)"/>
  <line x1="220" y1="420" x2="172" y2="420" stroke="#10b981" stroke-width="1.5" marker-end="url(#st-arrow)"/>
  <line x1="145" y1="405" x2="145" y2="357" stroke="#10b981" stroke-width="1.5" marker-end="url(#st-arrow)"/>

  <!-- STAR (bottom-right) -->
  <rect x="380" y="275" width="340" height="200" rx="8" fill="#16213e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="550" y="298" text-anchor="middle" class="topo-title" fill="#f59e0b">STAR</text>
  <text x="550" y="313" text-anchor="middle" class="topo-sub">(Central coordinator)</text>
  <!-- Center -->
  <rect x="525" y="338" width="50" height="30" rx="6" fill="#0f3460" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="550" y="358" text-anchor="middle" class="node" fill="#f59e0b">S</text>
  <!-- Spokes -->
  <rect x="425" y="400" width="50" height="30" rx="6" fill="#0f3460" stroke="#555" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" class="node">A</text>
  <rect x="525" y="400" width="50" height="30" rx="6" fill="#0f3460" stroke="#555" stroke-width="1"/>
  <text x="550" y="420" text-anchor="middle" class="node">B</text>
  <rect x="625" y="400" width="50" height="30" rx="6" fill="#0f3460" stroke="#555" stroke-width="1"/>
  <text x="650" y="420" text-anchor="middle" class="node">C</text>
  <line x1="540" y1="368" x2="455" y2="400" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <line x1="550" y1="368" x2="550" y2="400" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <line x1="560" y1="368" x2="645" y2="400" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>

  <!-- HIERARCHICAL-MESH (bottom) -->
  <rect x="120" y="490" width="500" height="120" rx="8" fill="#16213e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="370" y="513" text-anchor="middle" class="topo-title" fill="#ef4444">HIERARCHICAL-MESH (Recommended for 10+ agents)</text>
  <text x="370" y="528" text-anchor="middle" class="topo-sub">(Queen + peer communication)</text>
  <!-- Queen -->
  <rect x="345" y="535" width="50" height="26" rx="6" fill="#0f3460" stroke="#ef4444" stroke-width="1.5"/>
  <text x="370" y="553" text-anchor="middle" class="node" fill="#ef4444">Q</text>
  <!-- Leads -->
  <rect x="205" y="570" width="50" height="26" rx="6" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="230" y="588" text-anchor="middle" class="node" fill="#00d4ff">L1</text>
  <rect x="345" y="570" width="50" height="26" rx="6" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="370" y="588" text-anchor="middle" class="node" fill="#00d4ff">L2</text>
  <rect x="485" y="570" width="50" height="26" rx="6" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="510" y="588" text-anchor="middle" class="node" fill="#00d4ff">L3</text>
  <!-- Lines Q to leads -->
  <line x1="360" y1="561" x2="245" y2="570" stroke="#555" stroke-width="1.5"/>
  <line x1="370" y1="561" x2="370" y2="570" stroke="#555" stroke-width="1.5"/>
  <line x1="380" y1="561" x2="500" y2="570" stroke="#555" stroke-width="1.5"/>
  <!-- Mesh between leads -->
  <line x1="255" y1="583" x2="345" y2="583" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,2" opacity="0.6"/>
  <line x1="395" y1="583" x2="485" y2="583" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,2" opacity="0.6"/>
  <!-- Labels -->
  <text x="160" y="588" class="label">Leads (mesh)</text>
  <text x="555" y="588" class="label">Peers</text>
</svg>